- "AVOID: low-quality or unvetted imagery of the Kaaba or Al-Masjid Al-Haram — incorrect framing, cropping, or stylization of sacred sites is a severe violation that generates lasting brand harm"
- "AVOID: posting entertainment or lifestyle content in the same feed cadence as Hajj tribute content — the tonal whiplash is jarring and disrespectful"
