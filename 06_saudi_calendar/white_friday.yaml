content_focus_themes:
- countdown urgency and limited-time deal mechanics
- product-reveal content with prominent discount callouts
- category-specific deal spotlights (electronics, fashion, beauty, home)
- sold-out and scarcity signaling
- flash sale windows and time-limited flash drops
- gift-for-self and gift-for-others framing
- e-commerce-first content (swipe-up links, app downloads, cart reminders)
- influencer unboxing and haul content
content_dos:
- lead with the discount percentage prominently — Saudi White Friday shoppers are comparison-driven; hide the deal and you lose the click
- use countdown timers in Stories and Reels to create genuine urgency in the 72 hours before main sale day
- release deal preview content 5-7 days before the main event to build wishlist behavior
- use bright, high-contrast visuals — White Friday content should feel like an energy spike, not a brand editorial
- show specific products with before/after price callouts, not vague "up to X% off" claims
- leverage Instagram Shopping tags and direct-to-cart CTAs; this is the highest-converting swipe-up window of the year
- post flash sale windows with exact start/end times; punctuality is part of the trust signal
- use WhatsApp and Snapchat channel CTAs alongside Instagram — Saudi audiences shop across platforms during White Friday
- Arabic-primary copy; deal percentages in Arabic numerals resonate strongly with local audience
- extend content into the weekend post-Friday to capture the tail of the buying window
content_donts:
- do NOT use vague "amazing deals" language without a specific number or product anchor — it reads as filler
- do NOT post White Friday content in a tone-deaf context if a major religious or national event is happening simultaneously — check the calendar
- do NOT run the same creative across the full 10-day window; rotate deals daily to maintain urgency
- do NOT underdeliver on promises — if the content says "up to 70% off" and the landing page shows 10%, the brand takes lasting trust damage
- do NOT use long-form storytelling or brand narrative copy during the active sale window; audiences are in purchase mode, not content-consumption mode
- do NOT neglect the post-sale "thank you" content — a brief wrap-up post with sold-out signals reinforces scarcity for next year
recommended_chains: []
anti_pattern_warnings:
- "AVOID: 'Up to X% off everything' without product specifics — Saudi consumers have learned to discount this claim and scroll past it"
- "AVOID: launching White Friday campaigns after November 18 — the deal research phase starts 7-10 days out; late launchers lose the comparison-shopping window"
- "AVOID: applying Ramadan-level Arabic cultural sensitivity here — White Friday is a purely commercial event; reverent tone is tonally wrong"
- "AVOID: identical posts across all platforms — Instagram format, Snapchat, and TikTok audiences have different White Friday content expectations"
- "AVOID: running deals that are not actually discounted from a genuine prior price — KSA consumers and aggregator accounts will call out fake discounts publicly"
