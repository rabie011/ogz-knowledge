  severity: severe
  rationale: Diplomatic risk; brand exposure to political-positioning controversy.
  detection_hints: []
- id: 01KRKH1N32556H57SCDK12N6G4
  name: sectarian_iconography
  description: Sectarian or denominational religious iconography in commercial framing.
