cultural_spec_ulid: 01KSHVM9H477ZMPBYPPNZ775G5
schema_version: 1
scope_label: Beauty & Personal Care — comprehensive Saudi default
characters:
  ethnic_regional_look: general-saudi
  age_distribution:
    child: 0.05
    teen: 0.15
    young_adult: 0.40
    mid_age: 0.30
    elder: 0.10
  gender_presentation_rule: single-gender-per-scene
  face_visibility_women_rule: contextual
  hijab_style_preference: contextual
  mixed_gender_scene_rule: family-only-mixing
  class_signaling: professional-middle
  talent_consistency_model: rotating-core-cast
  facial_features_archetype: natural Saudi features with beauty-enhanced presentation
  expression_default: confident, radiant, subtle smile with engaged eyes
wardrobe:
  mens_traditional_cut: saudi-traditional
  mens_thobe_color: white default; cream for contemporary contexts
  mens_thobe_collar: button-cleric
  mens_head_covering_color: white shemagh optional in modern beauty contexts
  mens_head_covering_style: contextual
  mens_outer_layering: none
  womens_abaya_style: not-applicable
  womens_abaya_color: black default when worn in non-application contexts
  womens_embroidery_level: none
  womens_head_covering_type: contextual
  children_wardrobe_register: casual contemporary
  cultural_mixing_rule: modern-with-heritage-cues
body_language:
  sitting_position_default: seated upright on modern vanity chair or salon furniture; never with crossed-leg-showing-sole
  sitting_positions_allowed:
  - upright on chair
  - slight forward-lean toward mirror
  - legs tucked or crossed at ankle
  - relaxed shoulder posture during treatment
  standing_posture_default: shoulders square, weight even, hands visible or in lap; upright during consultations
  walking_style_default: confident, unhurried, dignified
  greeting_forms_allowed:
  - handshake (same gender)
  - shoulder touch (same gender, professional)
  - hand-on-heart (cross-gender, professional-distance)
  - verbal-only greeting with slight nod (cross-gender, formal contexts)
  eye_contact_rule: direct and confident with same-gender; respectful with cross-gender in professional beauty contexts; natural during beauty application
  cross_gender_distance_rule: professional distance minimum 50cm; beauty-professional contexts allow closer proximity for application
  physical_contact_same_gender_rule: warm and natural — hand-on-shoulder, hand-holding during consultations culturally normal in beauty contexts
gestures:
  forbidden_universal_list:
  - left-hand serving products or touching client face
  - palm-up-and-curling beckoning gesture (Western style)
  - pointing index finger directly at a person
  - soles of feet visible toward another person
  - shoes placed on or above seating surfaces
  - thumbs-up directed at religious or elder figures
  - the Western 'OK' circle gesture
  brand_allowed_list: []
  greeting_gestures_default: right hand to heart, then slight bow head
  hospitality_gestures_signature:
  - right-hand offer of refreshment
  - open-palm gesture inviting to sit
  - right-hand placement of product samples
  authority_gestures_for_beauty_professionals:
  - assured hand gestures during product application
  - gentle guidance of client's face with both hands during treatment
  - confident posture during consultation
  counting_convention_starts_with_little_finger: true
  beckoning_convention: palm-down-fingers-clawing
  emotional_expression_repertoire:
  - genuine warmth
  - radiant smile
  - engaged eye contact
  - hand on heart for sincere acknowledgement
  - nodding affirmation during consultation
  patience_gesture_thumb_forefinger_middle: true
  prayer_gesture_visibility_rule: not applicable in beauty-application contexts
settings_architecture:
  primary_regional_architecture: modern-riyadh
  secondary_architectures_allowed:
  - contemporary-noneist
  - luxury-salon-modern
  - wellness-spa-contemporary
  modern_vs_heritage_ratio: 98:2 modern
  specific_motifs_allowed:
  - contemporary geometric patterns
  - rose quartz accents
  - natural wood finishes
  - glass and stainless steel
  - soft ambient lighting
  material_palette:
  - matte porcelain
  - rose quartz
  - warm gold accents
  - soft linen
  - natural stone
  - white marble
  interior_setting_default: luxury beauty salon or spa; bright natural or warm ambient lighting; clean noneist aesthetic; pale neutral to warm pastel palette
  urban_vs_rural_orientation: urban-primary
  desert_scenes_allowed: false
  religious_setting_treatment: not applicable
  cityscape_visibility_rule: Riyadh modern skyline acceptable in beauty-retail contexts
props_objects:
  coffee_service_props:
  - traditional dallah (coffee pot, optional in waiting area)
  - fenjan cups (small handle-less, optional)
  tea_service_props:
  - istikana glasses
  - shaped tea pot with gold-rim (optional in luxury contexts)
  date_variety_preference:
  - sukkari
  - khlas
  frankincense_props:
  - mabkhara (in spa contexts only, never during application)
  prayer_props_visibility: not applicable
  modern_tech_props:
  - smartphones for appointments/consultations
  - tablets for shade-matching or skin-analysis
  - professional lighting mirrors
  - skincare measurement devices
  heritage_props_recurring:
  - traditional coffee service (optional in waiting areas)
  - none sadu weavings as décor only
  food_specific_props:
  - water glasses
  - tea service
  brand_signature_hero_prop: beauty-product-primary; brand-overridden at onboarding
  forbidden_props_universal:
  - alcohol product imagery (any brand)
  - pork product imagery
  - religious symbols of other faiths used decoratively
  - gambling references
  - Quranic verses overlaid on product imagery
behaviors_rituals:
  coffee_serving_order_rule: optional; if served, elder first; right-to-left; never left-to-right
  food_eating_practice_default: not primary in beauty contexts; if refreshments served, right hand only
  bismillah_gesture_visibility: not applicable
  date_before_water_iftar_rule: true
  prayer_treatment_rule: not-shown
  friday_prayer_treatment: no commercial promotion 12:00–13:30 AST Fridays
  family_hierarchy_serving_order: not primary; professional service order applies
  elder_greeted_first_rule: true
  ramadan_specific_behaviors_required:
  - respect prayer times; no treatments scheduled during Jumu'ah 12:00–13:30 AST
  - offer water/dates after iftar (if evening appointments)
  - sensitivity to fasting clients during daytime
  eid_specific_behaviors_required:
  - beauty services marketed for Eid preparation acceptable
  - special promotions framed around Eid celebrations acceptable
  hajj_specific_treatment: not applicable
  generational_silence_in_elder_presence_rule: younger professionals attentive to elder clients
social_dynamics:
  mixed_gender_workplace_rule: professional-mixing acceptable in modern salon/spa contexts
  mixed_gender_family_rule: family beauty contexts acceptable
  mixed_gender_public_rule: professional-service contexts only (salon/spa)
  physical_distance_minimum_cross_gender: professional service 30cm during application; 50cm during consultation
  modesty_threshold: moderate
  religious_authority_visual_treatment: not applicable
  family_authority_central_staging_rule: family-bonding beauty contexts acceptable
  modern_professional_authority_treatment: Saudi female beauty professionals shown competently in leadership roles
regional_orientation: general-saudi
heritage_gravity: present-anchored
religious_sensitivity: medium
generational_orientation: multi-gen
notes: Beauty & Personal Care sector default for Saudi region. Assumes face-visible, professional beauty-application contexts where hijab removal is natural and expected. Brand inherits this spec and overrides ~8–12 fields at onboarding (modesty_threshold, face_visibility, mixed_gender professional rules, brand_signature_hero_prop, setting_architecture preferences, props_objects, and others). Marked experimental pending Cultural Advisor validation.
