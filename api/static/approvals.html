<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1">
<title>قرارات محمد — OGZ</title>
<style>
  :root{--bg:#0d1117;--card:#161b22;--line:#30363d;--ink:#e6edf3;--dim:#8b949e;--go:#238636;--urgent:#f85149}
  body{background:var(--bg);color:var(--ink);font-family:-apple-system,"Segoe UI",Tahoma,sans-serif;margin:0;padding:16px;max-width:680px;margin-inline:auto;min-height:96vh;display:flex;flex-direction:column}
  .top{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
  h1{font-size:18px;margin:0} .prog{color:var(--dim);font-size:14px}
  .urgentbar{background:#2d1214;border:1px solid var(--urgent);color:#ffb3ae;border-radius:10px;padding:10px 14px;margin-bottom:12px;font-size:14px;display:none}
  .card{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:22px;flex:1;display:flex;flex-direction:column}
  .card.urgent{border-color:var(--urgent)}
  .tag{font-size:12px;color:#f0883e} .clock{color:var(--urgent);font-weight:700}
  h2{font-size:19px;margin:8px 0 12px;line-height:1.5} .desc{color:var(--dim);font-size:14px;line-height:1.8;margin-bottom:14px;white-space:pre-line}
  .opt{display:block;width:100%;text-align:right;background:#21262d;border:1px solid var(--line);color:var(--ink);
       border-radius:12px;padding:16px;margin:8px 0;font-size:15px;cursor:pointer;line-height:1.7}
  .opt:active{border-color:var(--go);background:#0f2418}
  input[type=number]{background:var(--bg);border:1px solid var(--line);color:var(--ink);border-radius:10px;padding:12px;width:100px;font-size:17px;text-align:center}
  .row{display:flex;gap:12px;align-items:end;flex-wrap:wrap;margin:10px 0}
  .send{background:var(--go);border:none;color:#fff;border-radius:10px;padding:14px 26px;font-size:15px;cursor:pointer;font-weight:700;margin-top:8px}
  textarea{background:var(--bg);border:1px solid var(--line);color:var(--ink);border-radius:10px;padding:12px;width:100%;box-sizing:border-box;font-size:14px;min-height:48px;font-family:inherit;margin-top:8px}
  .nav{display:flex;justify-content:space-between;gap:10px;margin-top:14px}
  .nav button{background:#21262d;border:1px solid var(--line);color:var(--ink);border-radius:10px;padding:12px 18px;font-size:14px;cursor:pointer}
  .saved{color:#3fb950;font-size:14px;margin-top:10px;font-weight:600}
  .donebox{text-align:center;padding:40px 0;color:#3fb950;font-size:17px;line-height:2}
  .small{font-size:12px;color:var(--dim)}
</style>
</head>
<body>
<div class="top"><h1>🟢 قرارات محمد</h1><div class="prog" id="prog"></div></div>
<div class="urgentbar" id="ubar">🚨 <b>طارئ</b> — في قرار مستعجل، طلع لك أول واحد</div>
<div id="stage"></div>
<script>
const K = new URLSearchParams(location.search).get('k') || '';
let ITEMS = [], idx = 0;

async function load(keepIndex){
  const r = await fetch('/api/approvals/items?k='+K); ITEMS = await r.json();
  const open = ITEMS.filter(i=>i.status!=='answered');
  if(!keepIndex) idx = 0;
  if(idx >= open.length) idx = Math.max(0, open.length-1);
  document.getElementById('ubar').style.display =
    open.some(i=>i.priority==='urgent') ? 'block' : 'none';
  render();
}
function render(){
  const open = ITEMS.filter(i=>i.status!=='answered');
  const total = ITEMS.length, done = total - open.length;
  document.getElementById('prog').textContent = done + ' / ' + total;
  const stage = document.getElementById('stage');
  if(!open.length){
    stage.innerHTML = '<div class="card"><div class="donebox">✅ خلصت كل القرارات<br><span class="small">أي قرار جديد يظهر هنا أول ما نضيفه — خلّ الصفحة مفتوحة</span></div></div>';
    return;
  }
  const it = open[idx];
  let h = `<div class="card ${it.priority==='urgent'?'urgent':''}">`;
  h += `<div class="tag">${it.priority==='urgent'?'🚨 طارئ · ':''}${it.tag||''} ${it.clock?'<span class=clock>'+it.clock+'</span>':''}</div><h2>${it.title}</h2>`;
  if(it.desc) h += `<div class="desc">${it.desc}</div>`;
  if(it.kind==='buttons'){
    for(const o of it.options) h += `<button class="opt" onclick="answer('${it.id}',${JSON.stringify(o.v).replace(/"/g,'&quot;')})">${o.label}</button>`;
    h += `<textarea id="note" placeholder="ملاحظة (اختياري)…"></textarea>`;
  }
  if(it.kind==='numbers'){
    h += '<div class="row">';
    for(const n of it.fields) h += `<label class="small">${n.label}<br><input type="number" id="f_${n.k}" value="${n.v}"></label>`;
    h += `</div><button class="send" onclick="answerNumbers('${it.id}',${JSON.stringify(it.fields.map(f=>f.k)).replace(/"/g,'&quot;')})">ثبّت ✓</button>
          <button class="opt" onclick="answer('${it.id}','adjust')">عدّلوها — اكتب في الملاحظة</button>
          <textarea id="note" placeholder="ملاحظة…"></textarea>`;
  }
  if(it.kind==='text'){
    h += `<textarea id="txt" placeholder="${it.placeholder||'اكتب هنا…'}"></textarea>
          <button class="send" onclick="answerText('${it.id}')">أرسل ✓</button>`;
  }
  h += `<div style="flex:1"></div><div class="nav">
        <button onclick="move(1)">التالي ⏭</button>
        <span class="small" style="align-self:center">${idx+1} من ${open.length} مفتوح</span>
        <button onclick="move(-1)">⏮ السابق</button></div></div>`;
  stage.innerHTML = h;
}
function move(d){ const open = ITEMS.filter(i=>i.status!=='answered');
  idx = (idx + d + open.length) % open.length; render(); }
async function post(id, answer){
  const note = (document.getElementById('note')||{}).value || '';
  await fetch('/api/approvals/answer?k='+K,{method:'POST',headers:{'Content-Type':'application/json'},
    body:JSON.stringify({item_id:id, answer:answer, note:note})});
  await load(true); // auto-advance: answered item leaves the open list
}
function answer(id,v){ post(id,v); }
function answerNumbers(id,keys){ const vals={};
  for(const k of keys) vals[k]=document.getElementById('f_'+k).value;
  post(id, JSON.stringify(vals)); }
function answerText(id){ post(id, document.getElementById('txt').value); }
load();
setInterval(()=>load(true), 25000); // new/emergency items appear while the page is open
</script>
</body>
</html>
