<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>OGZ — قرارات</title>
<style>
  :root{
    --bg:#0a0e14; --bg2:#0d1320; --card:#141a26; --line:#283040; --line2:#1d2433;
    --ink:#f2f6fc; --ink2:#c4cede; --dim:#8a96a9;
    --green:#33EB05; --green-d:#0f2a08; --pink:#E602BB; --blue:#4a6cff; --blue-d:#0e1830;
    --urgent:#ff5a52; --gold:#ffd76a;
    --r:16px;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0}
  body{background:radial-gradient(120% 80% at 50% -10%,#101826 0%,var(--bg) 55%);color:var(--ink);
       font-family:-apple-system,"SF Pro Text","Segoe UI",Tahoma,sans-serif;
       padding:14px 14px calc(28px + env(safe-area-inset-bottom));max-width:560px;margin-inline:auto;
       line-height:1.6;-webkit-font-smoothing:antialiased}
  button,textarea,input{font-family:inherit}

  /* ── header ── */
  .hero{display:flex;align-items:center;gap:12px;margin-bottom:14px}
  .logo{width:40px;height:40px;border-radius:12px;background:linear-gradient(135deg,var(--green),var(--blue));
        display:flex;align-items:center;justify-content:center;font-weight:900;color:#04130a;font-size:14px;letter-spacing:.3px}
  .hero h1{font-size:17px;margin:0;font-weight:800}
  .hero .sub{font-size:12.5px;color:var(--dim);margin-top:1px}
  .ring{margin-inline-start:auto;position:relative;width:54px;height:54px;flex:none}
  .ring svg{transform:rotate(-90deg)}
  .ring .num{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:800}

  /* ── identity picker ── */
  .whobar{display:flex;gap:7px;align-items:center;overflow-x:auto;background:var(--bg2);border:1px solid var(--line2);
          border-radius:13px;padding:8px 11px;margin-bottom:10px;scrollbar-width:none}
  .whobar::-webkit-scrollbar{display:none}
  .whobar .lbl{font-size:11.5px;color:var(--dim);flex:none}
  .whobar button{flex:none;background:#1a2233;border:1.5px solid var(--line);color:var(--ink2);border-radius:20px;
                 padding:8px 16px;font-size:13.5px;cursor:pointer;font-weight:700;min-height:40px}
  .whobar button.on{border-color:var(--green);background:var(--green-d);color:var(--green)}

  /* ── filter chips ── */
  .chips{display:flex;gap:7px;overflow-x:auto;padding-bottom:4px;margin-bottom:12px;scrollbar-width:none}
  .chips::-webkit-scrollbar{display:none}
  .chip{flex:none;background:var(--card);border:1px solid var(--line);color:var(--dim);border-radius:20px;
        padding:8px 15px;font-size:13px;cursor:pointer;white-space:nowrap;min-height:38px}
  .chip.on{border-color:var(--green);color:var(--green);background:var(--green-d)}

  .urgentbar{background:linear-gradient(90deg,#2d1214,#1a0d0e);border:1px solid var(--urgent);color:#ffb3ae;
             border-radius:12px;padding:11px 14px;margin-bottom:12px;font-size:13.5px;display:none}
  .bulkbar{background:var(--green-d);border:1.5px solid #1f5a12;border-radius:12px;padding:11px 13px;
           margin-bottom:12px;display:flex;align-items:center;gap:10px;font-size:13px;color:#bdf0ad}
  .bulkbar button{background:var(--green);border:none;color:#04130a;border-radius:10px;padding:10px 16px;
                  font-size:13.5px;font-weight:800;cursor:pointer;margin-inline-start:auto;min-height:42px}

  /* ── card shell ── */
  .card{background:linear-gradient(180deg,#161d2b,#121825);border:1px solid var(--line);border-radius:20px;
        padding:18px 17px 16px;margin-bottom:14px;animation:in .22s ease;box-shadow:0 8px 30px #00000040}
  @keyframes in{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}
  .card.urgent{border-color:var(--urgent);box-shadow:0 0 0 1px #ff5a5240,0 8px 30px #ff5a5215}

  /* Z0 context strip */
  .ctx{display:flex;align-items:center;gap:8px;flex-wrap:wrap;font-size:11.5px;margin-bottom:11px}
  .pill{border-radius:7px;padding:4px 9px;font-weight:700;letter-spacing:.2px;white-space:nowrap}
  .pill.lane{background:#16233f;color:#9cc0ff;border:1px solid #24407a}
  .pill.brand{background:#231a2e;color:#e7a8df;border:1px solid #5a2a72}
  .pill.clock{background:#2a1413;color:#ff9d96;border:1px solid #6e2c30}
  .pill.who{background:#1a2233;color:var(--dim);border:1px solid var(--line);margin-inline-start:auto}

  /* Z1 why-line hero */
  .why{font-size:16.5px;font-weight:800;color:var(--ink);line-height:1.55;margin:0 0 6px}
  .why .lead{color:var(--green)}
  h2.title{font-size:14px;margin:0 0 12px;font-weight:600;color:var(--ink2);line-height:1.5}

  /* summary: what we need / what the system did */
  .summary{background:var(--bg2);border:1px solid var(--line2);border-radius:13px;padding:12px 13px;margin-bottom:14px}
  .summary .row{display:flex;gap:9px;font-size:13.5px;line-height:1.7;padding:3px 0}
  .summary .row+.row{border-top:1px solid var(--line2);margin-top:3px;padding-top:9px}
  .summary .k{flex:none;color:var(--dim);font-weight:700;min-width:74px}
  .summary .v{color:var(--ink2)}
  .summary .v b{color:#fff}

  /* Z2/Z3 post option */
  .opt-post{background:var(--bg);border:1px solid var(--line);border-radius:16px;overflow:hidden;margin:12px 0}
  .opt-post .ohead{padding:8px 13px;font-size:11px;color:var(--pink);letter-spacing:.5px;font-weight:700;
                   background:#11131c;border-bottom:1px solid var(--line2)}
  .opt-post img{width:100%;display:block;max-height:46vh;object-fit:contain;background:#05070b}
  .opt-post .scene{font-size:11px;color:var(--dim);padding:7px 13px;background:#0c1019;border-bottom:1px solid var(--line2)}
  .opt-post .cap{padding:16px 15px;font-size:17px;line-height:2;text-align:center;color:var(--ink)}
  .opt-post .pickwrap{padding:0 13px 14px;text-align:center}

  /* Z3 buttons / caption picks */
  .opt{display:block;width:100%;text-align:right;background:#1a2233;border:1.5px solid var(--line);color:var(--ink);
       border-radius:14px;padding:15px 16px;margin:9px 0;font-size:15px;cursor:pointer;line-height:1.6;
       min-height:52px;touch-action:manipulation;transition:border-color .15s,background .15s}
  .opt:active{border-color:var(--green);background:var(--green-d)}
  .opt.rec{border-color:#2f7a18;background:#13230d}
  .opt .star{color:var(--gold);font-size:12px;font-weight:800;display:block;margin-bottom:4px}
  .opt .ex{display:block;font-size:12.5px;color:var(--dim);margin-top:6px;font-weight:400;line-height:1.65}
  .cap-pick{background:var(--bg);border:1.5px solid var(--line);border-radius:15px;padding:20px 16px;margin:11px 0;
            font-size:17px;line-height:2;text-align:center;position:relative}
  .cap-pick .who{position:absolute;top:-10px;right:16px;background:var(--card);border:1px solid var(--pink);
                 color:var(--pink);font-size:10.5px;border-radius:11px;padding:2px 11px}

  .pick{background:var(--green);border:none;color:#04130a;border-radius:12px;padding:14px 30px;font-size:15px;
        cursor:pointer;font-weight:800;min-height:52px;width:100%;touch-action:manipulation}
  .pick:disabled{opacity:.5}

  /* numbers / text */
  .row{display:flex;gap:14px;align-items:end;flex-wrap:wrap;margin:12px 0}
  input[type=number]{background:var(--bg);border:1.5px solid var(--line);color:var(--ink);border-radius:11px;
                     padding:13px;width:108px;font-size:18px;text-align:center;font-weight:700;min-height:52px}
  .send{background:var(--green);border:none;color:#04130a;border-radius:12px;padding:14px 26px;font-size:15px;
        cursor:pointer;font-weight:800;min-height:52px;touch-action:manipulation}
  .ghost{background:transparent;border:1px solid var(--line);color:var(--dim);border-radius:11px;padding:13px 18px;
         font-size:14px;cursor:pointer;min-height:48px}

  /* Z4 verdict (choice-less cards only) */
  .verdict{display:flex;gap:10px;margin-top:12px}
  .verdict button{flex:1;border-radius:14px;padding:16px;font-size:16px;font-weight:800;cursor:pointer;min-height:56px;touch-action:manipulation}
  .verdict .ok{background:var(--green);color:#06250b;border:none}
  .verdict .no{background:transparent;color:var(--pink);border:1.5px solid var(--pink)}

  /* sent strip (post-decision) */
  .sent{display:none;background:var(--green-d);border:1px solid #1f5a12;border-radius:12px;padding:12px 14px;
        margin-top:12px;font-size:14px;color:#bdf0ad;font-weight:700}
  .sent b{color:#fff}

  /* Z5 write box */
  .writewrap{margin-top:14px}
  .write-aff{display:flex;align-items:center;gap:8px;background:var(--bg2);border:1px dashed var(--line);
             border-radius:13px;padding:13px 14px;font-size:14px;color:var(--dim);cursor:text;min-height:50px}
  .write-aff .pen{font-size:16px}
  .write-open{display:none}
  .write-open.show{display:block}
  .write-aff.hide{display:none}
  textarea.note{background:var(--bg);border:1.5px solid var(--blue);color:var(--ink);border-radius:13px;padding:13px;
                width:100%;font-size:15px;min-height:92px;line-height:1.7;resize:vertical;display:block}
  .write-tools{display:flex;align-items:center;gap:10px;margin-top:8px}
  .togglefix{display:flex;align-items:center;gap:7px;font-size:12.5px;color:var(--dim);cursor:pointer;user-select:none}
  .togglefix .box{width:20px;height:20px;border:1.5px solid var(--line);border-radius:6px;display:flex;
                  align-items:center;justify-content:center;font-size:13px}
  .togglefix.on{color:var(--gold)} .togglefix.on .box{border-color:var(--gold);background:#2a2310;color:var(--gold)}
  .sendnote{margin-inline-start:auto;background:var(--blue);border:none;color:#fff;border-radius:11px;
            padding:11px 20px;font-size:14px;font-weight:700;cursor:pointer;min-height:44px}

  /* rating */
  .stars{display:flex;gap:5px;justify-content:center;margin:14px 0 2px;direction:ltr}
  .stars button{background:none;border:none;font-size:28px;cursor:pointer;opacity:.3;transition:.15s;padding:6px;
                min-width:44px;min-height:44px;color:var(--gold)}
  .stars button.on{opacity:1;transform:scale(1.12)}
  .stars-cap{font-size:11.5px;text-align:center;color:var(--dim);opacity:.8}

  /* Z6 deeper details */
  details.deep{margin-top:14px;border-top:1px solid var(--line2);padding-top:12px}
  details.deep>summary{color:var(--blue);font-size:13px;cursor:pointer;list-style:none;font-weight:700}
  details.deep>summary::-webkit-details-marker{display:none}
  details.deep>summary::before{content:'▸ ';color:var(--dim)}
  details.deep[open]>summary::before{content:'▾ '}
  .deepbody{font-size:13px;color:var(--ink2);line-height:1.85;margin-top:11px}
  .deepbody .blk{background:var(--bg2);border:1px solid var(--line2);border-radius:11px;padding:11px 12px;margin:9px 0}
  .deepbody .h{font-size:11px;color:var(--pink);letter-spacing:.4px;font-weight:700;display:block;margin-bottom:5px}
  .deepbody .quote{background:var(--bg);border-radius:8px;padding:8px 11px;margin-top:6px;font-size:12.5px;color:#c8d2e0}
  .cmd{background:#05080d;border:1.5px solid var(--gold);border-radius:11px;padding:12px;margin:10px 0;
       font-family:ui-monospace,Menlo,monospace;font-size:12px;color:#ffe8a3;direction:ltr;text-align:left;
       word-break:break-all;line-height:1.6}
  .cmdcopy{background:var(--gold);border:none;color:#1a1400;border-radius:10px;padding:11px 18px;font-size:13.5px;
           font-weight:800;cursor:pointer;width:100%;min-height:44px}

  /* Z7 quiet footer */
  .foot{display:flex;align-items:center;gap:8px;margin-top:16px;padding-top:13px;border-top:1px solid var(--line2)}
  .foot button{background:transparent;border:1px solid var(--line2);color:var(--dim);border-radius:10px;
               padding:10px 13px;font-size:13px;cursor:pointer;min-height:44px}
  .foot .skip{border-style:dashed}
  .foot .pos{font-size:12px;color:var(--dim);margin-inline:auto}
  .foot .next{color:var(--ink2);border-color:var(--line)}

  /* done list */
  .done-h{font-size:13.5px;color:var(--dim);margin:24px 0 11px;border-top:1px solid var(--line);padding-top:20px}
  .done-item{background:#0e1219;border:1px solid var(--line2);border-radius:13px;padding:13px 14px;margin-bottom:9px;
             font-size:13.5px;line-height:1.7}
  .done-item .ans{color:var(--green);font-weight:700}
  .done-item .byj{font-size:11.5px;color:var(--dim);background:#161d2b;border-radius:6px;padding:2px 8px;margin-inline-start:6px}
  .rev{background:transparent;border:1px solid #6e2c30;color:#ff9d96;border-radius:9px;padding:8px 14px;font-size:12.5px;
       cursor:pointer;margin-top:9px;min-height:40px}
  .revbox{display:none;margin-top:9px}
  .revbox.show{display:block}

  /* global note pill */
  .gnote-pill{display:flex;align-items:center;gap:9px;background:var(--bg2);border:1px solid var(--line2);
              border-radius:13px;padding:13px 14px;margin:18px 0 6px;font-size:13.5px;color:var(--dim);cursor:text;min-height:50px}
  .gnote-open{display:none;margin:14px 0 6px}
  .gnote-open.show{display:block}
  .gnote-open textarea{background:var(--card);border:1.5px solid var(--blue);color:var(--ink);border-radius:13px;
                       padding:13px;width:100%;font-size:14px;min-height:70px}
  .gnote-open button{background:var(--blue);border:none;color:#fff;border-radius:11px;padding:12px 22px;font-size:14px;
                     font-weight:700;cursor:pointer;margin-top:8px;min-height:44px}

  /* made-by chip + flag */
  .madeby{display:flex;align-items:center;gap:8px;margin:-3px 0 10px}
  .mbchip{font-size:11.5px;color:var(--dim);background:#141a26;border:1px dashed var(--line);
          border-radius:8px;padding:5px 10px;cursor:pointer}
  .mbchip.on{color:var(--gold);border-color:var(--gold);background:#2a2310}
  .flagbtn{margin-inline-start:auto;background:none;border:1px solid var(--line2);border-radius:9px;
           font-size:15px;padding:6px 11px;cursor:pointer;min-height:38px}
  /* flag bottom sheet */
  #flagsheet{position:fixed;inset:0;background:#000a;display:none;z-index:40;align-items:flex-end}
  #flagsheet.show{display:flex}
  .fs-in{background:var(--card);border-top:1.5px solid var(--line);border-radius:20px 20px 0 0;
         padding:18px 16px calc(18px + env(safe-area-inset-bottom));width:100%;max-width:560px;margin-inline:auto}
  .fs-t{font-size:15px;font-weight:800;margin-bottom:12px}
  .fs-chips{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:12px}
  .fs-chip{background:#1a2233;border:1.5px solid var(--line);color:var(--ink2);border-radius:18px;
           padding:9px 15px;font-size:13px;cursor:pointer;min-height:40px}
  .fs-chip.on{border-color:var(--pink);color:var(--pink);background:#231019}
  /* players view */
  .pl-row{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:13px 14px;
          margin-bottom:9px;display:flex;align-items:center;gap:10px}
  .pl-name{font-weight:800;font-size:14.5px;min-width:90px}
  .pl-dots{display:flex;gap:3px;direction:ltr}
  .pl-dot{width:9px;height:9px;border-radius:50%}
  .pl-dot.green{background:var(--green)} .pl-dot.red{background:var(--urgent)}
  .pl-dot.yellow{background:var(--gold)} .pl-dot.grey{background:#3a4356}
  .pl-stats{margin-inline-start:auto;font-size:11.5px;color:var(--dim);text-align:left;line-height:1.6}
  .pl-badge{font-size:10.5px;border-radius:6px;padding:2px 7px;background:#2a1413;color:#ff9d96;border:1px solid #6e2c30}
  .tabbtn{background:var(--card);border:1px solid var(--line);color:var(--ink2);border-radius:11px;
          padding:9px 14px;font-size:13px;cursor:pointer;min-height:40px}
  .tabbtn.on{border-color:var(--blue);color:#9cc0ff}
  .empty{text-align:center;padding:30px 16px}
  .empty .big{font-size:36px} .empty .t{color:var(--green);font-weight:800;margin:10px 0 4px}
  .small{font-size:12px;color:var(--dim)}
  .toast{position:fixed;top:14px;left:50%;transform:translateX(-50%);background:var(--green);color:#04130a;
         padding:12px 24px;border-radius:12px;font-size:14px;font-weight:800;display:none;z-index:50;
         box-shadow:0 6px 24px #33EB0540;max-width:90vw;text-align:center}
  .toast.err{background:var(--urgent);color:#fff;box-shadow:0 6px 24px #ff5a5240}
</style>
</head>
<body>
<div class="toast" id="toast"></div>

<div class="hero">
  <div class="logo">OGZ</div>
  <div><h1 id="h1">قرارات OGZ</h1><div class="sub" id="subline">…</div></div>
  <div class="ring"><svg width="54" height="54">
    <circle cx="27" cy="27" r="22" stroke="#283040" stroke-width="5" fill="none"/>
    <circle id="ringbar" cx="27" cy="27" r="22" stroke="#33EB05" stroke-width="5" fill="none"
            stroke-linecap="round" stroke-dasharray="138" stroke-dashoffset="138"/></svg>
    <div class="num" id="ringnum"></div></div>
</div>

<div class="whobar" id="whobar"></div>
<div style="display:flex;gap:8px;margin-bottom:10px">
  <button class="tabbtn on" id="tab_cards" onclick="setView('cards')">📋 القرارات</button>
  <button class="tabbtn" id="tab_players" onclick="setView('players')">🧠 اللاعبين</button>
</div>
<div class="chips" id="chips"></div>
<div class="urgentbar" id="ubar">🚨 <b>طارئ</b> — قرار مستعجل، طالع لك أول واحد</div>
<div id="bulk"></div>
<div id="stage"></div>
<div id="players" style="display:none"></div>
<div id="gnoteHost"></div>
<div id="doneList"></div>
<div id="flagsheet" onclick="if(event.target===this)closeFlag()"></div>

<script>
const K = new URLSearchParams(location.search).get('k') || '';
let ITEMS=[], idx=0, FILTER='الكل', SEEN=new Set(), posting=false, curId=null;
let SKIPPED = new Set(JSON.parse(localStorage.getItem('ogz_skipped')||'[]'));
let RATINGS={}, FIXMODE={};                 // per-card, never global

/* ---------- helpers ---------- */
function esc(s){ return (s==null?'':String(s))
  .replace(/&/g,'&amp;').replace(/'/g,'&#39;').replace(/"/g,'&quot;')
  .replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function toast(m,err){ const t=document.getElementById('toast'); t.textContent=m;
  t.className='toast'+(err?' err':''); t.style.display='block';
  clearTimeout(t._t); t._t=setTimeout(()=>t.style.display='none',2000); }
function cat(it){ return it.cat || (it.tag||'').split('·')[0].trim() || 'عام'; }
function isTyping(){ const a=document.activeElement; return a && (a.tagName==='TEXTAREA'||a.tagName==='INPUT'); }
function isDirty(){ return [...document.querySelectorAll('#stage textarea')].some(t=>t.value.trim()); }
const LANE={strategy:'📊 استراتيجية',creative:'🎨 إبداع',business:'💼 أعمال',ops:'⚙️ تشغيل',نظام:'⚙️ نظام'};

/* drafts (backstop behind the suppress-guard) */
function draftKey(id){ return 'draft:'+id+':'+WHO; }
function saveDraft(id,v){ try{ v.trim()?localStorage.setItem(draftKey(id),v):localStorage.removeItem(draftKey(id)); }catch(e){} }
function getDraft(id){ try{ return localStorage.getItem(draftKey(id))||''; }catch(e){ return ''; } }

/* ---------- identity (server-resolved when a per-judge key is used) ---------- */
let MEMBERS=[{id:'mohamed',name:'محمد',owner:true}];
let WHO = localStorage.getItem('ogz_who') || 'mohamed';
let FIXED_ID=false, REASONS=[];
async function whoami(){
  try{ const r=await fetch('/api/approvals/whoami?k='+K);
    if(r.ok){ const d=await r.json(); if(d.members&&d.members.length) MEMBERS=d.members;
      if(d.judge){ WHO=d.judge; FIXED_ID=true; } } }catch(e){}
  if(!MEMBERS.find(m=>m.id===WHO)) WHO=MEMBERS[0].id;
  try{ const r2=await fetch('/api/approvals/reasons?k='+K);
    if(r2.ok) REASONS=(await r2.json()).codes||[]; }catch(e){}
  renderWho();
}
function renderWho(){
  const me=MEMBERS.find(m=>m.id===WHO)||MEMBERS[0];
  document.getElementById('h1').textContent = me.owner?'قرارات OGZ':'مرحبا '+me.name;
  document.getElementById('whobar').innerHTML = FIXED_ID
    ? `<span class="lbl">أنت:</span><button class="on">👤 ${esc(me.name)} ✓</button>
       <button onclick="repudiate()" style="border-style:dashed">مو أنا ✋</button>`
    : '<span class="lbl">مين أنت؟</span>'+
      MEMBERS.map(m=>`<button class="${m.id===WHO?'on':''}" onclick="setWho('${esc(m.id)}')">${esc(m.name)}</button>`).join('');
}
function setWho(id){ if(FIXED_ID) return; WHO=id; localStorage.setItem('ogz_who',id); renderWho();
  toast('👤 '+((MEMBERS.find(m=>m.id===id)||{}).name||'')); renderCard(); }
async function repudiate(){
  // «مو أنا»: someone else tapped on this device — the server marks the previous row
  if(!confirm('آخر حكم من هذا الجهاز مو منك؟')) return;
  const ok=await post('_repudiation','مو أنا','','');
  if(ok) toast('✋ سجلناها — الحكم السابق معلَّم');
}

/* ---------- data ---------- */
async function refresh(){              // fetch + ambient patch, STAGE protected while writing
  let data; try{ const r=await fetch('/api/approvals/items?k='+K); data=await r.json(); }
  catch(e){ return; }                  // silent: ambient refresh shouldn't nag
  ITEMS=data; patchAmbient();
  if(isTyping()||isDirty()) return;    // THE FIX: never rebuild the card under the cursor
  const open=openItems();
  const wantId = open.length? open[Math.min(idx,open.length-1)].id : null;
  if(wantId!==curId) renderCard();     // only rebuild when the visible card actually changed
}
function openItems(){
  let o=ITEMS.filter(i=>i.status!=='answered');
  if(FILTER!=='الكل') o=o.filter(i=>cat(i)===FILTER);
  o.sort((a,b)=>(SKIPPED.has(a.id)-SKIPPED.has(b.id)) || ((a.priority!=='urgent')-(b.priority!=='urgent')));
  return o;
}
function patchAmbient(){
  const all=ITEMS.length, done=ITEMS.filter(i=>i.status==='answered').length;
  const left=all-done, mins=Math.max(1,Math.round(left*0.4));
  document.getElementById('subline').textContent = done===all?'كل شيء مجاب ✓':`${left} قرار · ~${mins} دقيقة`;
  document.getElementById('ringnum').textContent = done+'/'+all;
  document.getElementById('ringbar').style.strokeDashoffset = 138-138*(all?done/all:0);
  const cats=['الكل',...new Set(ITEMS.filter(i=>i.status!=='answered').map(cat))];
  document.getElementById('chips').innerHTML = cats.map(c=>
    `<div class="chip ${c===FILTER?'on':''}" onclick="setFilter('${esc(c)}')">${esc(c)}</div>`).join('');
  const open=openItems();
  document.getElementById('ubar').style.display = open.some(i=>i.priority==='urgent')?'block':'none';
  renderBulk(open); renderDone();
}
function setFilter(c){ FILTER=c; idx=0; patchAmbient(); renderCard(); }

/* bulk-approve: ONLY when every card in the group has been SEEN this session */
function renderBulk(open){
  const host=document.getElementById('bulk');
  if(FILTER!=='الكل' && open.length>1 && open.every(i=>SEEN.has(i.id)))
    host.innerHTML=`<div class="bulkbar">📦 شفت كل الـ${open.length} في «${esc(FILTER)}» —
      <button onclick="bulkApprove()">✅ اعتمدها كلها</button></div>`;
  else host.innerHTML='';
}

/* ---------- the card ---------- */
function renderCard(){
  const open=openItems();
  const stage=document.getElementById('stage');
  if(!open.length){
    curId=null;
    stage.innerHTML=`<div class="card empty"><div class="big">🎉</div>
      <div class="t">خلصت كل المفتوح هنا</div>
      <div class="small">الجديد يطلع تلقائياً · المجاب تحت لو تبي تعكس</div></div>`;
    renderGnote(); return;
  }
  if(idx>=open.length) idx=open.length-1;
  const it=open[idx]; curId=it.id; SEEN.add(it.id);
  const id=it.id, kind=it.kind, lane=it.lane;
  const choice = ['buttons','numbers','text','caption_pick','post_pick'].includes(kind);
  const me=MEMBERS.find(m=>m.id===WHO)||MEMBERS[0];

  let h=`<div class="card ${it.priority==='urgent'?'urgent':''}">`;

  /* Z0 context */
  h+=`<div class="ctx">`;
  if(it.priority==='urgent') h+=`<span class="pill clock">🚨 طارئ</span>`;
  if(LANE[lane]) h+=`<span class="pill lane">${LANE[lane]}</span>`;
  const brand=(it.brand_context&&it.brand_context.name)||it.brand;
  if(brand) h+=`<span class="pill brand">${esc(brand)}</span>`;
  if(it.clock && it.clock.trim()) h+=`<span class="pill clock">${esc(it.clock)}</span>`;
  h+=`<span class="pill who">👤 ${esc(me.name)}</span></div>`;
  /* صنعه chip (tap = judge the PLAYER not the card) + 🚩 flag (opens an issue) */
  if(it.made_by){
    const tm=TARGETMODE[id];
    h+=`<div class="madeby"><span class="mbchip ${tm?'on':''}" onclick="toggleTarget('${esc(id)}')">
        صنعه: ${esc(playerAr(it.made_by))}${it.artifact_version?' · نسخة '+it.artifact_version:''}${tm?' — تحكم عليه هو ✓':''}</span>
        <button class="flagbtn" onclick="openFlag('${esc(id)}')">🚩</button></div>`;
  }

  /* Z1 why-line + title */
  const why = it.why || (it.meaning? String(it.meaning).split(/[.؟!]\s/)[0] : '') || it.title;
  h+=`<div class="why"><span class="lead">ليش؟</span> ${esc(why)}</div>`;
  if(it.title && it.title!==why) h+=`<h2 class="title">${esc(it.title)}</h2>`;

  /* summary: what we need / what the system did */
  if(it.need||it.did||it.current||it.proposed){
    h+=`<div class="summary">`;
    if(it.need) h+=`<div class="row"><span class="k">المطلوب</span><span class="v">${esc(it.need)}</span></div>`;
    if(it.did)  h+=`<div class="row"><span class="k">سوّاه النظام</span><span class="v">${esc(it.did)}</span></div>`;
    if(it.current)  h+=`<div class="row"><span class="k">الحالي</span><span class="v">${esc(it.current)}</span></div>`;
    if(it.proposed) h+=`<div class="row"><span class="k">المقترح</span><span class="v"><b>${esc(it.proposed)}</b></span></div>`;
    h+=`</div>`;
  }

  /* Z2/Z3 the thing + Z4 primary action */
  // PICKS pass the option INDEX (an int) — never the value — so a quote/angle-bracket
  // in o.v can never break the inline handler. pick() resolves the real value from data.
  if(kind==='post_pick'){
    it.options.forEach((o,i)=>{
      h+=`<div class="opt-post"><div class="ohead">عقل ${esc(o.who||o.v)}</div>`;
      if(o.image_url){ h+=`<img src="${esc(o.image_url)}" alt="">`;
        if(o.ai_generated) h+=`<div class="scene">🤖 صورة AI للمشهد فقط — حكمك عليها = حكم على الفكرة</div>`; }
      h+=`<div class="cap">${esc(o.label)}</div>
          <div class="pickwrap"><button class="pick" onclick="pick('${esc(id)}',${i})">اختار هذا ✓</button></div></div>`;
    });
  } else if(kind==='caption_pick'){
    it.options.forEach((o,i)=>
      h+=`<div class="cap-pick"><span class="who">${esc(o.who||o.v)}</span>${esc(o.label)}
          <br><button class="pick" style="width:auto;margin-top:14px;padding:12px 28px" onclick="pick('${esc(id)}',${i})">اختار هذا ✓</button></div>`);
  } else if(kind==='buttons'){
    it.options.forEach((o,i)=>
      h+=`<button class="opt ${o.rec?'rec':''}" onclick="pick('${esc(id)}',${i})">
          ${o.rec?'<span class="star">⭐ التوصية</span>':''}${esc(o.label)}
          ${o.explain?'<span class="ex">↳ '+esc(o.explain)+'</span>':''}</button>`);
  } else if(kind==='numbers'){
    h+=`<div class="row">`;
    for(const n of it.fields) h+=`<label class="small">${esc(n.label)}<br>
      <input type="number" id="f_${esc(id)}_${esc(n.k)}" value="${esc(n.v)}"></label>`;
    h+=`</div><button class="send" onclick="answerNumbers('${esc(id)}',${esc(JSON.stringify(it.fields.map(f=>f.k)))})">ثبّت ✓</button>`;
  } else if(kind==='text'){
    h+=`<textarea class="note" id="txt_${esc(id)}" placeholder="${esc(it.placeholder||'اكتب هنا…')}"
        oninput="onType('${esc(id)}',this)"></textarea>
        <button class="send" style="margin-top:10px" onclick="answerText('${esc(id)}')">أرسل ✓</button>`;
  }

  /* sent strip (post-decision explain stays live) */
  h+=`<div class="sent" id="sent_${esc(id)}"></div>`;

  /* Z4 verdict — ONLY on choice-less content cards (never beside a pick) */
  if(!choice)
    h+=`<div class="verdict">
        <button class="ok" onclick="answer('${esc(id)}','approved')">✅ اعتماد</button>
        <button class="no" onclick="answer('${esc(id)}','rejected')">❌ رفض</button></div>`;

  /* Z5 ONE write box (collapsed → tap to expand; toggle = comment|correction) */
  const dft=getDraft(id);
  h+=`<div class="writewrap">
      <div class="write-aff ${dft?'hide':''}" id="aff_${esc(id)}" onclick="openWrite('${esc(id)}')">
        <span class="pen">✏️</span><span>صحّح أو اكتب رأيك — اختياري</span></div>
      <div class="write-open ${dft?'show':''}" id="wo_${esc(id)}">
        <textarea class="note" id="note_${esc(id)}" placeholder="اكتب تعليقك أو التصحيح…"
          oninput="onType('${esc(id)}',this)">${esc(dft)}</textarea>
        <div class="write-tools">
          <span class="togglefix ${FIXMODE[id]?'on':''}" id="tf_${esc(id)}" onclick="toggleFix('${esc(id)}')">
            <span class="box">${FIXMODE[id]?'✓':''}</span> هذا تصحيح (يصير الحقيقة)</span>
          <button class="sendnote" onclick="sendWrite('${esc(id)}')">أرسل</button>
        </div></div></div>`;

  /* rating */
  const rt=RATINGS[id]||0;
  h+=`<div class="stars" id="stars_${esc(id)}">`+
     [1,2,3,4,5].map(n=>`<button class="${n<=rt?'on':''}" onclick="setRating('${esc(id)}',${n})">★</button>`).join('')+
     `</div><div class="stars-cap">تقييمك (اختياري)</div>`;

  /* Z6 deeper (strategy lane defaults OPEN) */
  const deep=buildDeep(it);
  if(deep) h+=`<details class="deep" ${lane==='strategy'?'open':''}>
      <summary>تفاصيل أعمق</summary><div class="deepbody">${deep}</div></details>`;

  /* Z7 quiet footer */
  h+=`<div class="foot">
      <button class="next" onclick="move(1)">التالي ⏭</button>
      <button class="skip" onclick="skipIt('${esc(id)}')">أخّره 🕐</button>
      <span class="pos">${idx+1}/${open.length}</span>
      <button onclick="move(-1)">⏮</button></div>`;

  h+=`</div>`;
  stage.innerHTML=h;
  renderGnote();
}

function buildDeep(it){
  let d='';
  const b=it.brand_context;
  if(b){ d+=`<div class="blk"><span class="h">البراند</span><b>${esc(b.name||'')}</b> · ${esc(b.state_line||'')}<br>
            ${esc(b.who||'')}<br><span class="small">🎙 ${esc(b.voice_line||'')} · 🛒 ${esc((b.products||[]).join('، '))}</span>`;
    for(const ex of (b.real_examples||[])) d+=`<div class="quote">«${esc(ex)}»</div>`;
    d+=`</div>`; }
  for(const o of (it.options||[])){
    if(o.idea||(o.shots&&o.shots.length)){
      d+=`<div class="blk"><span class="h">عقل ${esc(o.who||o.v)}</span>`;
      if(o.idea) d+=`💡 ${esc(o.idea)}<br>`;
      if(o.shots&&o.shots.length) d+=`📸 ${esc(o.shots.map((s,i)=>(i+1)+'. '+s).join(' · '))}`;
      d+=`</div>`;
    }
  }
  if(it.desc){
    const parts=String(it.desc).split('|'); const body=parts[0].trim();
    const cmd=parts.length>1?parts.slice(1).join('|').trim():'';
    if(body) d+=`<div class="blk"><span class="h">الخلفية</span>${esc(body)}</div>`;
    if(cmd) d+=`<div class="cmd" id="cmd_${esc(it.id)}">${esc(cmd)}</div>
                <button class="cmdcopy" onclick="copyCmd('${esc(it.id)}')">📋 انسخ الأمر</button>`;
  }
  return d;
}

/* ---------- write box ---------- */
function openWrite(id){ document.getElementById('aff_'+id).classList.add('hide');
  const wo=document.getElementById('wo_'+id); wo.classList.add('show');
  const t=document.getElementById('note_'+id); if(t) t.focus(); }
function toggleFix(id){ FIXMODE[id]=!FIXMODE[id];
  const el=document.getElementById('tf_'+id); el.classList.toggle('on',FIXMODE[id]);
  el.querySelector('.box').textContent=FIXMODE[id]?'✓':''; }
function onType(id,el){ saveDraft(id,el.value); }
async function sendWrite(id){
  const t=document.getElementById('note_'+id); const v=(t?t.value:'').trim();
  if(!v){ toast('اكتب شيئاً أول',true); return; }
  const ok = FIXMODE[id]
    ? await post(id,'comment','',v)        // fix
    : await post(id,'comment',v,'');       // note
  if(ok){ saveDraft(id,''); toast(FIXMODE[id]?'✏️ تصحيحك وصل':'💬 وصلت'); }
}

/* ---------- answering ---------- */
let RATING_OF=id=>RATINGS[id]||0;
function setRating(id,n){ RATINGS[id]=(RATINGS[id]===n)?0:n;
  const box=document.getElementById('stars_'+id); if(!box) return;
  [...box.children].forEach((b,i)=>b.className=(i< (RATINGS[id]||0))?'on':''); }

function buildBody(id,answer,note,fix,extras){
  const it=ITEMS.find(x=>x.id===id)||{};
  const b={item_id:id,answer:answer,note:note||'',fix:fix||'',rating:RATING_OF(id)||null,
    judge:WHO, client_ts:new Date().toISOString().slice(0,19),
    artifact_id: it.id? 'card:'+it.id : null,
    artifact_version: it.artifact_version||null,
    target: TARGETMODE[id]&&it.made_by ? it.made_by : null, ...(extras||{})};
  return b;
}
async function post(id,answer,note,fix,extras){
  if(posting) return false; posting=true;
  const body=buildBody(id,answer,note,fix,extras);
  try{
    const r=await fetch('/api/approvals/answer?k='+K,{method:'POST',
      headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});
    if(!r.ok) throw new Error('http '+r.status);
    return true;
  }catch(e){
    // OFFLINE QUEUE: park it, flush later — the tap is never lost
    const q=JSON.parse(localStorage.getItem('ogz_outbox')||'[]');
    q.push(body); localStorage.setItem('ogz_outbox',JSON.stringify(q));
    renderOutbox(); toast('📥 ما في نت — بالطابور، بترسل لحالها',true);
    return false;
  }
  finally{ posting=false; }
}
function renderOutbox(){
  const q=JSON.parse(localStorage.getItem('ogz_outbox')||'[]');
  let el=document.getElementById('outbox');
  if(!q.length){ if(el) el.remove(); return; }
  if(!el){ el=document.createElement('div'); el.id='outbox'; el.className='urgentbar';
    el.style.display='block'; document.getElementById('ubar').after(el); }
  el.innerHTML=`📥 في الطابور: ${q.length} — بترسل أول ما يرجع النت`;
}
async function flushOutbox(){
  const q=JSON.parse(localStorage.getItem('ogz_outbox')||'[]');
  if(!q.length) return;
  const left=[];
  for(const body of q){
    try{ const r=await fetch('/api/approvals/answer?k='+K,{method:'POST',
        headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});
      if(!r.ok&&r.status!==403) left.push(body); }
    catch(e){ left.push(body); }
  }
  localStorage.setItem('ogz_outbox',JSON.stringify(left));
  renderOutbox(); if(q.length>left.length) toast(`📤 أرسلنا ${q.length-left.length} من الطابور`);
}
window.addEventListener('online',flushOutbox);

/* ---------- player feedback: صنعه toggle + 🚩 flag sheet ---------- */
let TARGETMODE={};                 // card id → true = the write box judges the PLAYER
const PLAYER_AR={'claude':'كلود','rabie':'رابي','mind:ceo':'عقل المدير التنفيذي','mind:coo':'عقل العمليات',
  'mind:cco':'عقل الإبداع','mind:firaasa':'فِراسة','mind:metaphor':'الاستعارة','mind:authenticity':'الأصالة',
  'mind:heritage':'التراث','mind:paradox':'المفارقة','system:feedback_cards':'نظام التغذية الراجعة'};
function playerAr(p){ return PLAYER_AR[p]||p; }
function toggleTarget(id){ TARGETMODE[id]=!TARGETMODE[id]; curId=null; renderCard();
  if(TARGETMODE[id]) toast('🎯 كتابتك الحين على الصانع نفسه'); }
let FLAGCHIP=null;
function openFlag(id){
  const it=ITEMS.find(x=>x.id===id); if(!it) return;
  FLAGCHIP=null;
  const lane=(it.lane==='strategy'||it.lane==='ops')?'system':'creative';
  const chips=REASONS.filter(c=>c.status==='active'&&(c.lane===lane||c.lane==='system')).slice(0,8);
  document.getElementById('flagsheet').innerHTML=`<div class="fs-in">
    <div class="fs-t">🚩 وش المشكلة في شغل ${esc(playerAr(it.made_by||'النظام'))}؟ <span class="small">(الرقاقة اختيارية)</span></div>
    <div class="fs-chips">${chips.map(c=>`<button class="fs-chip" data-code="${esc(c.code)}"
      onclick="pickChip(this)">${esc(c.ar)}</button>`).join('')}</div>
    <textarea class="note" id="flagnote" placeholder="كلامك بالحرف — يفتح قضية على الصانع"></textarea>
    <div class="write-tools">
      <button class="ghost" onclick="closeFlag()">إلغاء</button>
      <button class="sendnote" onclick="sendFlag('${esc(id)}')">🚩 افتح قضية</button>
    </div></div>`;
  document.getElementById('flagsheet').classList.add('show');
}
function pickChip(el){ const was=el.classList.contains('on');
  document.querySelectorAll('.fs-chip').forEach(c=>c.classList.remove('on'));
  if(!was){ el.classList.add('on'); FLAGCHIP=el.dataset.code; } else FLAGCHIP=null; }
function closeFlag(){ document.getElementById('flagsheet').classList.remove('show'); }
async function sendFlag(id){
  const it=ITEMS.find(x=>x.id===id)||{};
  const note=(document.getElementById('flagnote')||{}).value||'';
  if(!note.trim()&&!FLAGCHIP){ toast('اكتب أو اختر رقاقة',true); return; }
  const ok=await post(id,'flagged',note,'',{source:'flag_sheet',
    target: it.made_by||null, reason_codes: FLAGCHIP?[FLAGCHIP]:[]});
  if(ok){ closeFlag(); toast('🚩 فتحنا قضية — بتشوف نتيجتها في تقرير الأسبوع'); }
}

/* resolve an option by INDEX from live data → real value (quote-proof) */
function pick(id,i){ const it=ITEMS.find(x=>x.id===id)||ITEMS.find(x=>x.id===curId);
  const o=it&&it.options&&it.options[i]; if(!o) return; answer(id,o.v); }

/* a verdict/pick: send, then show a calm sent-strip and KEEP the write box live (explain can follow) */
async function answer(id,v){
  const noteEl=document.getElementById('note_'+id);
  const note = (!FIXMODE[id]&&noteEl)?noteEl.value.trim():'';
  const fix  = (FIXMODE[id]&&noteEl)?noteEl.value.trim():'';
  const ok=await post(id,v,note,fix);
  if(!ok) return;
  saveDraft(id,'');
  const labelMap={approved:'✅ اعتماد',rejected:'❌ رفض'};
  const it=(ITEMS.find(x=>x.id===id)||{});
  const opt=(it.options||[]).find(o=>o.v===v);
  const shown=labelMap[v]||(opt?opt.label:v);
  const strip=document.getElementById('sent_'+id);
  if(strip){ strip.style.display='block';
    strip.innerHTML=`اخترت: <b>${esc(shown)}</b> — أرسلنا ✓ · تقدر تضيف سبب في صندوق الكتابة فوق، أو <a href="javascript:void(0)" onclick="move(1)" style="color:#bdf0ad;text-decoration:underline">التالي ⏭</a>`; }
  toast('تم ✓');
  // refresh ambient (ring/done) WITHOUT yanking the card away
  try{ const rr=await fetch('/api/approvals/items?k='+K); ITEMS=await rr.json(); patchAmbient(); }catch(e){}
}
function answerNumbers(id,keys){ const vals={};
  for(const k of keys){ const el=document.getElementById('f_'+id+'_'+k); vals[k]=el?el.value:''; }
  answer(id,JSON.stringify(vals)); }
function answerText(id){ const el=document.getElementById('txt_'+id);
  const v=(el?el.value:'').trim(); if(!v){ toast('اكتب شيئاً أول',true); return; }
  post(id,v,'','').then(ok=>{ if(ok){ saveDraft(id,''); toast('أرسلنا ✓'); move(1);} }); }

function move(d){ const o=openItems(); if(!o.length) return;
  idx=(idx+d+o.length)%o.length; curId=null; renderCard(); }
function skipIt(id){ SKIPPED.add(id); localStorage.setItem('ogz_skipped',JSON.stringify([...SKIPPED]));
  toast('أخّرناه 🕐'); idx=0; curId=null; patchAmbient(); renderCard(); }
function copyCmd(id){ const el=document.getElementById('cmd_'+id); if(!el) return;
  navigator.clipboard.writeText(el.textContent).then(()=>toast('📋 انتسخ')).catch(()=>toast('📋 حدّده وانسخه',true)); }

async function bulkApprove(){
  const grp=openItems(); if(!grp.length||!grp.every(i=>SEEN.has(i.id))) return;
  if(!confirm('اعتماد '+grp.length+' كروت شفتها كلها؟')) return;
  let n=0; for(const it of grp){ if(await post(it.id,'approved','','')) n++; }
  toast('✅ اعتمدت '+n); curId=null;
  try{ const rr=await fetch('/api/approvals/items?k='+K); ITEMS=await rr.json(); }catch(e){}
  patchAmbient(); renderCard();
}

/* ---------- done list ---------- */
function renderDone(){
  const done=ITEMS.filter(i=>i.status==='answered');
  const el=document.getElementById('doneList');
  if(!done.length){ el.innerHTML=''; return; }
  let h=`<div class="done-h">✓ المجاب (${done.length}) — اضغط لعكس أي قرار</div>`;
  for(const it of done){
    const bn=(MEMBERS.find(m=>m.id===it.answered_by)||{}).name||it.answered_by;
    const by=it.answered_by?`<span class="byj">👤 ${esc(bn)}</span>`:'';
    h+=`<div class="done-item"><b>${esc(it.title)}</b>${by}<br>
        إجابة: <span class="ans">${esc(it.answered||'—')}</span>
        <br><button class="rev" onclick="document.getElementById('rv_${esc(it.id)}').classList.add('show')">⮌ اعكس</button>
        <div class="revbox" id="rv_${esc(it.id)}">
          <textarea class="note" id="rvn_${esc(it.id)}" placeholder="سبب العكس (إلزامي — يعلّم النظام)"></textarea>
          <button class="send" style="margin-top:8px" onclick="reverse('${esc(it.id)}')">أكّد العكس</button></div></div>`;
  }
  el.innerHTML=h;
}
async function reverse(id){
  const el=document.getElementById('rvn_'+id); const note=(el?el.value:'').trim();
  if(!note){ toast('⚠️ اكتب السبب أول',true); return; }
  try{ const r=await fetch('/api/approvals/reverse?k='+K,{method:'POST',
      headers:{'Content-Type':'application/json'},body:JSON.stringify({item_id:id,note:note,judge:WHO})});
    if(!r.ok) throw 0; toast('⮌ انعكس'); curId=null;
    const rr=await fetch('/api/approvals/items?k='+K); ITEMS=await rr.json(); patchAmbient(); renderCard();
  }catch(e){ toast('⚠️ ما وصل — جرّب ثاني',true); }
}

/* ---------- global note (collapsed pill, not fixed) ---------- */
let GNOTE_OPEN=false;
function renderGnote(){
  const host=document.getElementById('gnoteHost');
  if(GNOTE_OPEN){ host.innerHTML=`<div class="gnote-open show">
      <textarea id="gnote" placeholder="💬 ملاحظة عامة لكلود — توصل فوراً"></textarea>
      <button onclick="sendGnote()">أرسل لكلود</button></div>`;
    const t=document.getElementById('gnote'); if(t) t.focus(); }
  else host.innerHTML=`<div class="gnote-pill" onclick="GNOTE_OPEN=true;renderGnote()">
      💬 <span>ملاحظة عامة لكلود؟</span></div>`;
}
async function sendGnote(){
  const t=document.getElementById('gnote'); const v=(t?t.value:'').trim(); if(!v){ toast('اكتب شيئاً أول',true); return; }
  const ok=await post('_general_note',v,v,''); if(ok){ GNOTE_OPEN=false; renderGnote(); toast('💬 وصلت'); }
}

/* ---------- players view (read-only, 100% from the derived file) ---------- */
let VIEW='cards';
function setView(v){ VIEW=v;
  document.getElementById('tab_cards').className='tabbtn'+(v==='cards'?' on':'');
  document.getElementById('tab_players').className='tabbtn'+(v==='players'?' on':'');
  for(const id of ['chips','ubar','bulk','stage','doneList'])
    document.getElementById(id).style.display = v==='cards' ? '' : 'none';
  document.getElementById('players').style.display = v==='players' ? '' : 'none';
  if(v==='cards'){ patchAmbient(); } else renderPlayers();
}
async function renderPlayers(){
  const host=document.getElementById('players');
  host.innerHTML='<div class="small" style="padding:14px">…</div>';
  let d; try{ d=await (await fetch('/api/approvals/scorecards?k='+K)).json(); }
  catch(e){ host.innerHTML='<div class="small">⚠️ ما قدرنا نجيبها'; return; }
  const ps=(d.scorecards||{}).players||{};
  const order=Object.entries(ps).sort((a,b)=>(b[1].streak-a[1].streak)||(b[1].lifetime.judged-a[1].lifetime.judged));
  if(!order.length){ host.innerHTML='<div class="card empty"><div class="big">🧠</div><div class="t">لسه ما في أحكام كافية</div><div class="small">كل حكم تحكمه يبني سجل اللاعبين</div></div>'; return; }
  let h='';
  for(const [p,c] of order){
    const lt=c.lifetime;
    h+=`<div class="pl-row">
      <span class="pl-name">${esc(playerAr(p))}${c.benched?' <span class="pl-badge">🧊 موقوف</span>':''}</span>
      <span class="pl-dots">${(c.dots||[]).map(d=>`<span class="pl-dot ${d}"></span>`).join('')}</span>
      <span class="pl-stats">${lt.judged||0} حُكم · ${lt.approved||0} ✓ · ${lt.rejected||0} ✗ · ${lt.corrected||0} ✏️
        ${c.rates?`<br>${c.rates.approved_pct}% موافقة`:`<br>${esc(c.low_n_note||'')}`}
        ${c.open_issues?`<br><span style="color:#ff9d96">🔴 ${c.open_issues} قضايا مفتوحة</span>`:''}
        ${c.streak>=2?`<br>🧊 ${c.streak} رفضات ورا بعض`:''}</span>
    </div>`;
  }
  const prov=(d.scorecards||{}).by_judge&&d.scorecards.by_judge.rabie_provisional;
  if(prov&&Object.keys(prov).length){
    h+=`<div class="small" style="margin:14px 4px 6px">آراء رابي (مبدئية — ما تُحسب حتى تراجعها):</div>`;
    for(const [t,v] of Object.entries(prov))
      h+=`<div class="pl-row"><span class="pl-name">${esc(playerAr(t))}</span>
          <span class="pl-stats">رابي: ${v.avg}/5 (n=${v.n}) — مبدئي</span></div>`;
  }
  host.innerHTML=h;
}

/* ---------- boot ---------- */
whoami().then(()=>{ refresh(); flushOutbox(); renderOutbox(); });
setInterval(()=>{ refresh(); flushOutbox(); }, 25000);   // ambient-only while typing; never wipes the card
</script>
