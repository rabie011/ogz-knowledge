<!doctype html>
<!-- THE FEEDBACK DASHBOARD (July 2, 2026 — Mohamed's order: "the one place I live in").
     Built ON TOP of the proven portal: same key auth, same /api/approvals/items feed,
     same /api/approvals/answer write path (ONE write path, Rule #6). What this adds:
     full-deck + full-post rendering and INLINE element comments (schema_v3 comments[]),
     per the DeepSeek consult feedback-dashboard-ux-20260702: one row per verdict,
     quote+quote_hash per pin, routing done downstream (feedback_router / judgment_intake). -->
<html lang="ar">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>OGZ · Review</title>
<style>
:root{
  --bg:#0c0d0f; --card:#14161a; --card2:#1a1d22; --line:#272b32; --line2:#333945;
  --ink:#eae7e0; --mut:#8f939c; --dim:#6b6f78;
  --ok:#34d399; --ok-dim:#0e2a20; --edit:#f5b544; --edit-dim:#2b220e; --kill:#f87171; --kill-dim:#2a1414;
  --pin:#67c8ff; --pin-dim:#0e2230;
  --r:14px;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;padding:0;background:var(--bg);color:var(--ink);
  font:16px/1.55 -apple-system,"SF Pro","SF Arabic","Segoe UI",system-ui,sans-serif}
body{padding-bottom:170px}
button{font:inherit;border:0;cursor:pointer;background:none;color:inherit}
input,textarea{font:inherit;color:var(--ink);background:var(--card2);border:1px solid var(--line);
  border-radius:10px;padding:.55em .8em;outline:none}
textarea:focus,input:focus{border-color:var(--pin)}
::placeholder{color:var(--dim)}

/* ---------- header ---------- */
#hdr{position:sticky;top:0;z-index:30;background:rgba(12,13,15,.88);backdrop-filter:blur(14px);
  border-bottom:1px solid var(--line);padding:10px 16px 8px}
.hrow{max-width:780px;margin:0 auto;display:flex;align-items:center;gap:10px;flex-wrap:wrap}
#mark{font-weight:800;letter-spacing:.4px;font-size:15px}
#mark b{color:var(--ok)}
#live{width:7px;height:7px;border-radius:50%;background:var(--ok);animation:pulse 2.4s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.25}}
#who{color:var(--mut);font-size:12.5px;margin-inline-start:auto}
#chips{max-width:780px;margin:8px auto 0;display:flex;gap:6px;overflow-x:auto;scrollbar-width:none}
#chips::-webkit-scrollbar{display:none}
.chip{flex:0 0 auto;padding:.34em .85em;border-radius:99px;border:1px solid var(--line);
  color:var(--mut);font-size:13px;font-weight:600;transition:.15s}
.chip.on{background:var(--ink);color:var(--bg);border-color:var(--ink)}
.chip small{opacity:.65;font-weight:700;margin-inline-start:.35em}

/* ---------- nav strip ---------- */
#navrow{max-width:780px;margin:14px auto 0;padding:0 16px;display:flex;align-items:center;gap:12px;color:var(--mut);font-size:13px}
#navrow .nav{width:34px;height:34px;border-radius:10px;border:1px solid var(--line);display:grid;place-items:center;font-size:15px;color:var(--ink)}
#navrow .nav:active{background:var(--card2)}
#pos{font-variant-numeric:tabular-nums}

/* ---------- the item ---------- */
#stage{max-width:780px;margin:10px auto;padding:0 16px}
.itemcard{background:var(--card);border:1px solid var(--line);border-radius:var(--r);overflow:hidden}
.ihead{padding:16px 18px 10px;border-bottom:1px solid var(--line)}
.ihead h1{margin:0;font-size:18.5px;line-height:1.4}
.meta{display:flex;gap:8px;flex-wrap:wrap;margin-top:8px}
.pill{font-size:11.5px;font-weight:700;padding:.2em .7em;border-radius:99px;border:1px solid var(--line2);color:var(--mut)}
.pill.urgent{color:var(--kill);border-color:var(--kill)}
.pill.mkr{color:var(--pin)}
.guides{padding:10px 18px;border-bottom:1px solid var(--line);color:var(--mut);font-size:13.5px;display:grid;gap:4px}
.guides b{color:var(--ink);font-weight:600}
.gline{display:flex;gap:.5em}.gline .ico{flex:0 0 auto}

/* ---------- content blocks ---------- */
#body{padding:8px 18px 18px}
.slide{margin:18px 0 6px;border:1px solid var(--line);border-radius:12px;overflow:hidden;background:var(--card2)}
.slide>.stitle{display:flex;align-items:center;gap:10px;padding:10px 14px;background:var(--bg);
  border-bottom:1px solid var(--line);font-weight:700;font-size:14.5px}
.snum{flex:0 0 auto;width:24px;height:24px;border-radius:8px;background:var(--card2);border:1px solid var(--line2);
  display:grid;place-items:center;font-size:12px;color:var(--mut);font-variant-numeric:tabular-nums}
.sbody{padding:6px 8px}
.blk{position:relative;padding:7px 12px;margin:2px 0;border-radius:9px;border-inline-start:3px solid transparent;
  transition:background .12s;cursor:pointer;white-space:pre-wrap;word-break:break-word}
.blk:hover{background:rgba(255,255,255,.035)}
.blk.pinned{border-inline-start-color:var(--pin);background:var(--pin-dim)}
.blk.tbl{font-family:ui-monospace,SFMono-Regular,Menlo,monospace;font-size:12.5px;line-height:1.7;overflow-x:auto;white-space:pre}
.blk.h{font-weight:700;font-size:15.5px;color:var(--ink)}
.blk .kbadge{position:absolute;inset-inline-end:8px;top:6px;font-size:10px;color:var(--pin);opacity:0;transition:.12s;font-weight:700}
.blk:hover .kbadge{opacity:.9}
.postimg{width:100%;border-radius:12px;display:block;border:1px solid var(--line)}
.imgwrap{position:relative;margin:14px 0 4px;cursor:pointer;border-radius:12px}
.imgwrap.pinned{outline:3px solid var(--pin);outline-offset:2px}
.imgwrap .kbadge{position:absolute;inset-inline-end:10px;top:10px;background:rgba(0,0,0,.55);color:var(--pin);
  font-size:11px;font-weight:700;padding:.25em .7em;border-radius:99px;opacity:0;transition:.12s}
.imgwrap:hover .kbadge{opacity:1}
.capzone{margin-top:10px}
.capzone .blk{font-size:18px;line-height:1.9}
.seclbl{margin:16px 4px 4px;font-size:11.5px;font-weight:800;letter-spacing:1.2px;color:var(--dim);text-transform:uppercase}

/* ---------- pins & composer ---------- */
.pinrow{display:flex;align-items:flex-start;gap:8px;margin:4px 10px 8px;padding:8px 12px;border-radius:10px;
  background:var(--pin-dim);border:1px solid #1d3a4d;font-size:13.5px}
.pinrow .ptxt{flex:1;min-width:0}.pinrow .pq{color:var(--mut);font-size:12px;display:block;overflow:hidden;
  text-overflow:ellipsis;white-space:nowrap}
.pinrow .px{color:var(--mut);font-size:15px;padding:0 4px}
.pinrow .px:hover{color:var(--kill)}
.pinrow .pk{flex:0 0 auto;font-size:10.5px;font-weight:800;color:var(--pin);border:1px solid #1d4a63;
  border-radius:6px;padding:.15em .5em;margin-top:.15em}
#composer{margin:6px 10px 10px;padding:12px;border-radius:12px;background:var(--card2);border:1px solid var(--pin)}
#composer .cq{font-size:12.5px;color:var(--mut);margin-bottom:8px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
#composer textarea{width:100%;min-height:64px;resize:vertical}
.kinds{display:flex;gap:5px;flex-wrap:wrap;margin:8px 0}
.kpill{font-size:12px;font-weight:700;padding:.28em .8em;border-radius:99px;border:1px solid var(--line2);color:var(--mut)}
.kpill.on{background:var(--pin);color:#062033;border-color:var(--pin)}
.crow{display:flex;gap:8px;justify-content:flex-end;margin-top:4px}
.cbtn{padding:.45em 1.1em;border-radius:9px;font-weight:700;font-size:13.5px}
.cbtn.save{background:var(--pin);color:#062033}
.cbtn.cancel{color:var(--mut)}

/* ---------- options (decision buttons) ---------- */
.opts{display:grid;gap:8px;margin:14px 0 4px}
.opt{padding:.9em 1.1em;border-radius:12px;border:1px solid var(--line2);background:var(--card2);
  font-weight:600;text-align:start;font-size:15px;transition:.12s}
.opt:active{transform:scale(.985)}
.opt.rec{border-color:var(--ok);box-shadow:inset 0 0 0 1px var(--ok)}
.opt .recmark{color:var(--ok);font-size:11px;font-weight:800;margin-inline-start:.6em}
#txtanswer{width:100%;min-height:80px;margin-top:12px}

/* ---------- verdict bar ---------- */
#bar{position:fixed;bottom:0;left:0;right:0;z-index:40;background:rgba(16,18,21,.94);backdrop-filter:blur(16px);
  border-top:1px solid var(--line);padding:10px 16px calc(10px + env(safe-area-inset-bottom))}
#bar .inner{max-width:780px;margin:0 auto;display:grid;gap:8px}
#verdicts{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}
.vbtn{padding:.62em 0;border-radius:11px;font-weight:800;font-size:14.5px;border:1px solid var(--line2);color:var(--mut)}
.vbtn.ap.on{background:var(--ok-dim);border-color:var(--ok);color:var(--ok)}
.vbtn.ed.on{background:var(--edit-dim);border-color:var(--edit);color:var(--edit)}
.vbtn.ki.on{background:var(--kill-dim);border-color:var(--kill);color:var(--kill)}
#scorerow{display:flex;gap:4px;align-items:center}
#scorerow .slbl{font-size:11.5px;color:var(--dim);font-weight:800;letter-spacing:.5px;margin-inline-end:4px}
.sdot{flex:1;height:30px;border-radius:8px;border:1px solid var(--line);color:var(--dim);
  font-size:12px;font-weight:700;font-variant-numeric:tabular-nums}
.sdot.on{background:var(--ink);color:var(--bg);border-color:var(--ink)}
#noterow{display:flex;gap:8px}
#note{flex:1}
#submit{width:100%;padding:.75em;border-radius:12px;font-weight:800;font-size:15px;
  background:var(--card2);color:var(--dim);border:1px solid var(--line);transition:.15s}
#submit.ready{background:var(--ok);color:#04180e;border-color:var(--ok)}

/* ---------- misc ---------- */
#snack{position:fixed;bottom:180px;left:50%;transform:translateX(-50%) translateY(20px);z-index:50;
  background:var(--ink);color:var(--bg);padding:.6em 1em;border-radius:12px;font-weight:600;font-size:14px;
  display:flex;gap:12px;align-items:center;opacity:0;pointer-events:none;transition:.2s;max-width:88vw}
#snack.show{opacity:1;transform:translateX(-50%) translateY(0);pointer-events:auto}
#snack .undo{color:#0a52c7;font-weight:800}
.empty{max-width:780px;margin:60px auto;text-align:center;color:var(--mut)}
.empty .big{font-size:44px;margin-bottom:10px}
.donerow{display:flex;gap:10px;align-items:center;padding:12px 16px;border-bottom:1px solid var(--line);font-size:14px}
.donerow .da{color:var(--ok);font-weight:700;flex:0 0 auto}
.donerow .dt{flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.donerow .dw{color:var(--dim);font-size:12px;flex:0 0 auto}
.leaving{opacity:0;transform:translateY(-8px);transition:.22s}
</style>
</head>
<body>

<div id="hdr">
  <div class="hrow">
    <span id="mark">OGZ <b>·</b> REVIEW</span><span id="live"></span>
    <span id="who"></span>
  </div>
  <div id="chips"></div>
</div>
<div id="navrow">
  <button class="nav" onclick="step(-1)">‹</button>
  <span id="pos"></span>
  <button class="nav" onclick="step(1)">›</button>
  <span id="hint" style="margin-inline-start:auto;font-size:12px;color:var(--dim)">اضغط أي سطر لتعليق عليه 📌</span>
</div>
<div id="stage"></div>
<div id="bar" style="display:none"><div class="inner">
  <div id="verdicts">
    <button class="vbtn ap" onclick="setV('approved')">✓ Approve</button>
    <button class="vbtn ed" onclick="setV('edit')">✎ Edit</button>
    <button class="vbtn ki" onclick="setV('rejected')">✗ Kill</button>
  </div>
  <div id="scorerow"><span class="slbl">TASTE</span></div>
  <div id="noterow"><input id="note" placeholder="ملاحظة عامة / التصحيح…" oninput="D.note=this.value;save();syncBar()"></div>
  <button id="submit" onclick="submitVerdict()">Submit</button>
</div></div>
<div id="snack"></div>

<script>
/* ================= boot ================= */
const K=new URLSearchParams(location.search).get('k')||'';
let WHO=null, AUTH='none', ITEMS=[], FILTER='all', CUR=null, D=null, SNACK=null;

const FILTERS=[['all','الكل'],['proposal','Proposals'],['post','Posts'],['ask','Asks'],['done','Done']];
function famOf(it){
  if(it.status==='answered') return 'done';
  if(it.kind==='proposal_judge') return 'proposal';
  if(it.kind==='caption_judge'||String(it.id).startsWith('post_')) return 'post';
  return 'ask';
}
async function whoami(){
  const r=await fetch('/api/approvals/whoami?k='+encodeURIComponent(K));
  if(!r.ok){document.getElementById('stage').innerHTML='<div class="empty"><div class="big">🔑</div>المفتاح غلط أو ناقص — افتح الرابط الخاص فيك</div>';return false}
  const d=await r.json(); WHO=d.judge; AUTH=d.auth;
  document.getElementById('who').textContent=WHO?('👤 '+WHO):'view-only';
  return true;
}
async function load(first){
  try{
    const r=await fetch('/api/approvals/items?k='+encodeURIComponent(K),{cache:'no-cache'});
    if(!r.ok) return;
    ITEMS=await r.json();
  }catch(e){return}
  renderChips();
  if(first||!CUR||!ITEMS.find(x=>x.id===CUR)) pickNext();
  else renderChips();
  updatePos();
}
function queue(){
  let q=ITEMS.filter(x=>famOf(x)!=='done' && !x.collapsed);
  if(FILTER!=='all'&&FILTER!=='done') q=q.filter(x=>famOf(x)===FILTER);
  q.sort((a,b)=>((a.priority==='urgent'?0:1)-(b.priority==='urgent'?0:1))||String(a.created||'').localeCompare(String(b.created||'')));
  return q;
}
function pickNext(){ const q=queue(); CUR=q.length?q[0].id:null; loadDraft(); render(); }
function step(d){
  const q=queue(); if(!q.length) return;
  let i=q.findIndex(x=>x.id===CUR); i=(i<0?0:(i+d+q.length)%q.length);
  CUR=q[i].id; loadDraft(); render();
}
function updatePos(){
  const q=queue(); const i=q.findIndex(x=>x.id===CUR);
  document.getElementById('pos').textContent=q.length?((i+1)+' / '+q.length+' open'):'0 open';
}

/* ================= chips ================= */
function renderChips(){
  const counts={all:0,proposal:0,post:0,ask:0,done:0};
  for(const it of ITEMS){const f=famOf(it); counts[f]++; if(f!=='done'&&!it.collapsed)counts.all++;}
  document.getElementById('chips').innerHTML=FILTERS.map(([k,l])=>
    `<button class="chip ${FILTER===k?'on':''}" onclick="FILTER='${k}';pickNext();renderChips()">${l}<small>${k==='all'?counts.all:counts[k]}</small></button>`).join('');
}

/* ================= drafts (per-item, survives reload) ================= */
function dkey(){return 'ogzdash:'+CUR}
function loadDraft(){ try{D=JSON.parse(localStorage.getItem(dkey()))||null}catch(e){D=null}
  if(!D) D={verdict:null,rating:0,note:'',pins:[]}; }
function save(){ if(CUR) localStorage.setItem(dkey(),JSON.stringify(D)); }
function clearDraft(){ localStorage.removeItem(dkey()); }

/* ================= render ================= */
const esc=s=>String(s??'').replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
const md=s=>esc(s).replace(/\*\*([^*]+)\*\*/g,'<b>$1</b>').replace(/`([^`]+)`/g,'<code>$1</code>');

function blocksOf(text){
  // split into visual blocks: blank-line paragraphs; consecutive table/list lines grouped
  const out=[]; let buf=[], mode=null;
  const flush=()=>{ if(buf.length){out.push({t:buf.join('\n'),mode}); buf=[];} };
  for(const ln of String(text).split('\n')){
    const l=ln.trim();
    if(!l||/^[-_*—]{3,}$/.test(l)){flush();mode=null;continue}
    const m=l.startsWith('|')?'tbl':(l.startsWith('#')?'h':(/^[-*•]/.test(l)?'li':'p'));
    if(mode&&m!==mode&&!(mode==='li'&&m==='li')){flush()}
    mode=m; buf.push(l.replace(/^#+\s*/,''));
    if(m==='p'||m==='h'){flush();mode=null}
  }
  flush(); return out;
}
function slidesOf(mdText){
  const parts=String(mdText).split(/^## /m); const slides=[];
  if(parts[0].trim()) slides.push({title:null,body:parts[0]});
  for(let i=1;i<parts.length;i++){
    const nl=parts[i].indexOf('\n');
    slides.push({title:parts[i].slice(0,nl<0?undefined:nl).trim(), body:nl<0?'':parts[i].slice(nl+1)});
  }
  return slides;
}
const slug=s=>String(s).toLowerCase().replace(/[^a-z0-9؀-ۿ]+/g,'-').replace(/^-+|-+$/g,'').slice(0,24);
function guessKind(text,zone){
  if(zone==='visual')return 'visual';
  if(zone==='caption')return 'caption';
  if(/(SAR|ريال|ر\.س|السعر|الميزانية|تكلفة|٪|%\s|\d{1,3}([,.]\d{3})+)/.test(text))return 'price';
  if(/(استراتيجية|positioning|السوق)/.test(text))return 'strategy';
  return 'copy';
}
function pinFor(ref){ return D&&D.pins.find(p=>p.ref===ref); }

function blkHtml(text,ref,zone,cls){
  const p=pinFor(ref);
  return `<div class="blk ${cls||''} ${p?'pinned':''}" dir="auto" data-ref="${esc(ref)}" data-zone="${zone||''}"
    onclick="openComposer(this)">${md(text)}<span class="kbadge">📌 تعليق</span></div>${p?pinHtml(p):''}`;
}
function pinHtml(p){
  return `<div class="pinrow"><span class="pk">${esc(p.el_kind)}</span><span class="ptxt" dir="auto">${esc(p.text)}
    <span class="pq" dir="auto">${esc(p.quote)}</span></span>
    <button class="px" onclick="delPin('${esc(p.ref)}')">✕</button></div>`;
}

function render(){
  closeComposer(true);
  const st=document.getElementById('stage');
  if(FILTER==='done'){ renderDone(st); document.getElementById('bar').style.display='none'; updatePos(); return; }
  const it=ITEMS.find(x=>x.id===CUR);
  if(!it){ st.innerHTML='<div class="empty"><div class="big">🎉</div>الطابور فاضي — كل الشغل اتراجع<br><small>أي شغل جديد من الوكلاء يظهر هنا لحاله</small></div>';
    document.getElementById('bar').style.display='none'; updatePos(); return; }
  let h=`<div class="itemcard"><div class="ihead"><h1 dir="auto">${esc(it.title||it.id)}</h1><div class="meta">`;
  if(it.priority==='urgent')h+=`<span class="pill urgent">URGENT</span>`;
  if(it.tag)h+=`<span class="pill">${esc(it.tag)}</span>`;
  if(it.made_by)h+=`<span class="pill mkr">by ${esc(it.made_by)}</span>`;
  if(it.created)h+=`<span class="pill">${esc(String(it.created).slice(5,16).replace('T',' · '))}</span>`;
  h+=`</div></div>`;
  const guides=[['🎯',it.why],['👉',it.need],['⚙️',it.did]].filter(g=>g[1]);
  if(guides.length)h+=`<div class="guides">${guides.map(g=>`<div class="gline" dir="auto"><span class="ico">${g[0]}</span><span>${md(g[1])}</span></div>`).join('')}</div>`;
  h+=`<div id="body">`;

  if(it.kind==='proposal_judge'){
    const slides=slidesOf(it.caption||it.island_text||'');
    slides.forEach((s,si)=>{
      const sid='slide:'+si+(s.title?'-'+slug(s.title):'');
      h+=`<div class="slide">`;
      if(s.title)h+=`<div class="stitle" dir="auto"><span class="snum">${si}</span>${md(s.title)}</div>`;
      h+=`<div class="sbody">`;
      blocksOf(s.body).forEach((b,bi)=>{ h+=blkHtml(b.t,sid+'/blk:'+bi,'', b.mode==='tbl'?'tbl':(b.mode==='h'?'h':'')); });
      h+=`</div></div>`;
    });
  } else if(it.kind==='caption_judge'||String(it.id).startsWith('post_')){
    if(it.image_url){
      const p=pinFor('image');
      h+=`<div class="imgwrap ${p?'pinned':''}" data-ref="image" data-zone="visual" onclick="openComposer(this)">
        <img class="postimg" src="${esc(it.image_url)}" loading="lazy" alt="">
        <span class="kbadge">📌 تعليق على الصورة</span></div>`+(p?pinHtml(p):'');
    }
    h+=`<div class="seclbl">Caption</div><div class="capzone">`;
    String(it.caption||it.island_text||'').split('\n').filter(l=>l.trim()).forEach((l,i)=>{
      h+=blkHtml(l,'caption/line:'+i,'caption');
    });
    h+=`</div>`;
    if(it.post_idea)h+=`<div class="seclbl">Idea</div>`+blkHtml(it.post_idea,'idea','idea');
    if(it.post_visual&&typeof it.post_visual==='string'&&it.post_visual.length>4)
      h+=`<div class="seclbl">Shoot plan</div>`+blkHtml(String(it.post_visual).slice(0,2000),'shoot','visual');
  } else {
    for(const [f,ref] of [['desc','desc'],['island_text','text'],['caption','text2']])
      if(it[f]&&typeof it[f]==='string') blocksOf(it[f]).forEach((b,bi)=>{h+=blkHtml(b.t,ref+'/blk:'+bi,'',b.mode==='tbl'?'tbl':'')});
    if(it.kind==='text') h+=`<textarea id="txtanswer" placeholder="اكتب الجواب…" dir="auto"></textarea>`;
    if(it.options&&it.options.length){
      h+=`<div class="opts">`+it.options.map((o,i)=>
        `<button class="opt ${o.rec?'rec':''}" dir="auto" onclick="decide(${i})">${o.label}${o.rec?'<span class="recmark">موصى</span>':''}</button>`).join('')+`</div>`;
    }
  }
  h+=`</div></div>`;
  st.innerHTML=h;
  renderBar(it); updatePos();
}
function renderDone(st){
  const done=ITEMS.filter(x=>x.status==='answered').slice(-40).reverse();
  st.innerHTML=`<div class="itemcard">`+(done.map(d=>
    `<div class="donerow"><span class="da">${esc(String(d.answered||'').slice(0,14))}</span>
     <span class="dt" dir="auto">${esc(d.title||d.id)}</span><span class="dw">${esc(d.answered_by||'')}</span></div>`).join('')||
    `<div class="empty">ما فيه شغل مُراجع بعد</div>`)+`</div>`;
}

/* ================= composer (one at a time — the DeepSeek rule) ================= */
let COMP=null;
function openComposer(el){
  if(event&&event.target&&event.target.classList.contains('px'))return;
  const ref=el.dataset.ref; if(!ref||!WHO)return;
  if(COMP&&COMP.ref===ref){return}
  closeComposer(true);
  const quote=(el.innerText||'').replace(/📌.*$/m,'').trim().slice(0,220);
  const zone=el.dataset.zone||''; const guessed=guessKind(quote,zone);
  const KINDS=['copy','price','visual','caption','idea','script','strategy','data'];
  const c=document.createElement('div'); c.id='composer';
  c.innerHTML=`<div class="cq" dir="auto">📌 ${esc(quote||ref)}</div>
    <textarea id="ctext" placeholder="تعليقك على هالجزئية بالذات…" dir="auto"></textarea>
    <div class="kinds">${KINDS.map(k=>`<button class="kpill ${k===guessed?'on':''}" data-k="${k}"
      onclick="this.parentNode.querySelectorAll('.kpill').forEach(x=>x.classList.remove('on'));this.classList.add('on')">${k}</button>`).join('')}</div>
    <div class="crow"><button class="cbtn cancel" onclick="closeComposer()">إلغاء</button>
    <button class="cbtn save" onclick="savePin()">حفظ التعليق</button></div>`;
  el.insertAdjacentElement('afterend',c);
  COMP={ref,quote,el};
  const existing=pinFor(ref); if(existing){c.querySelector('#ctext').value=existing.text;
    c.querySelectorAll('.kpill').forEach(x=>x.classList.toggle('on',x.dataset.k===existing.el_kind));}
  c.querySelector('#ctext').focus();
}
function closeComposer(silent){ const c=document.getElementById('composer'); if(c)c.remove(); COMP=null; }
async function sha256hex(s){
  try{ const b=await crypto.subtle.digest('SHA-256',new TextEncoder().encode(s));
    return[...new Uint8Array(b)].map(x=>x.toString(16).padStart(2,'0')).join(''); }
  catch(e){ let h=5381; for(const ch of s)h=((h<<5)+h+ch.charCodeAt(0))>>>0; return 'djb2:'+h.toString(16); }
}
async function savePin(){
  if(!COMP)return;
  const text=document.getElementById('ctext').value.trim(); if(!text)return closeComposer();
  const kind=(document.querySelector('#composer .kpill.on')||{}).dataset?.k||'copy';
  const qh=await sha256hex(COMP.quote);
  D.pins=D.pins.filter(p=>p.ref!==COMP.ref);
  D.pins.push({ref:COMP.ref,text,quote:COMP.quote,quote_hash:qh,el_kind:kind});
  save(); closeComposer(); render();
}
function delPin(ref){ D.pins=D.pins.filter(p=>p.ref!==ref); save(); render(); }

/* ================= verdict bar ================= */
function renderBar(it){
  const judgeable=it&&(it.kind==='proposal_judge'||it.kind==='caption_judge'||String(it.id).startsWith('post_')||(!it.options&&it.kind!=='text'));
  document.getElementById('bar').style.display=(judgeable&&WHO)?'':'none';
  if(!judgeable)return;
  document.querySelectorAll('.vbtn').forEach(b=>b.classList.remove('on'));
  if(D.verdict==='approved')document.querySelector('.vbtn.ap').classList.add('on');
  if(D.verdict==='edit')document.querySelector('.vbtn.ed').classList.add('on');
  if(D.verdict==='rejected')document.querySelector('.vbtn.ki').classList.add('on');
  const sr=document.getElementById('scorerow');
  sr.innerHTML='<span class="slbl">TASTE</span>'+Array.from({length:10},(_,i)=>
    `<button class="sdot ${D.rating>i?'on':''}" onclick="D.rating=${i+1};save();renderBar(ITEMS.find(x=>x.id===CUR))">${i+1}</button>`).join('');
  document.getElementById('note').value=D.note||'';
  document.getElementById('note').placeholder=D.verdict==='edit'?'التصحيح نفسه (يوصل للوكيل حرفيًا)…':'ملاحظة عامة…';
  syncBar();
}
function syncBar(){
  const b=document.getElementById('submit');
  const ready=D&&(D.verdict||D.pins.length||(D.note||'').trim());
  const bits=[];
  if(D.verdict)bits.push(D.verdict==='approved'?'Approve ✓':(D.verdict==='edit'?'Edit ✎':'Kill ✗'));
  if(D.rating)bits.push('★'+D.rating);
  if(D.pins.length)bits.push(D.pins.length+' 📌');
  if((D.note||'').trim())bits.push('note');
  b.textContent=ready?('Submit · '+bits.join(' · ')):'اختر حكم أو علّق على جزئية';
  b.className=ready?'ready':'';
}

/* ================= submit (optimistic + undo, the proven outbox pattern) ================= */
function outbox(){try{return JSON.parse(localStorage.getItem('ogzdash_outbox')||'[]')}catch(e){return[]}}
function setOutbox(q){localStorage.setItem('ogzdash_outbox',JSON.stringify(q))}
function buildBody(it,answer,extras){
  return Object.assign({item_id:it.id,answer,note:(D.verdict==='edit')?'':(D.note||''),
    fix:(D.verdict==='edit')?(D.note||''):'',
    rating:D.rating||null,judge:WHO,client_ts:new Date().toISOString().slice(0,19),
    artifact_id:it.made_by?('card:'+it.id):null,
    artifact_version:parseInt(it.artifact_version)||null,
    comments:D.pins,source:'dashboard'},extras||{});
}
function submitVerdict(){
  const it=ITEMS.find(x=>x.id===CUR); if(!it)return;
  if(!(D.verdict||D.pins.length||(D.note||'').trim()))return;
  const answer=D.verdict||'comment';
  const body=buildBody(it,answer);
  const q=outbox(); q.push({body,grace:Date.now()+5000}); setOutbox(q);
  it.status='answered'; it.answered=answer; it.answered_by=WHO;
  showSnack('أُرسل: '+answer+(D.pins.length?(' + '+D.pins.length+' 📌'):''),body);
  clearDraft(); pickNext(); renderChips();
  setTimeout(flush,5100);
}
function decide(i){
  const it=ITEMS.find(x=>x.id===CUR); if(!it)return;
  const o=it.options[i]; if(!o)return;
  let ans=o.v;
  const body=buildBody(it,ans,{artifact_id:null,comments:[]});
  if(it.kind==='text'){const t=document.getElementById('txtanswer');if(t&&t.value.trim())body.answer=t.value.trim()}
  const q=outbox(); q.push({body,grace:Date.now()+5000}); setOutbox(q);
  it.status='answered'; it.answered=String(ans); it.answered_by=WHO;
  showSnack('أُرسل: '+String(o.label).replace(/<[^>]*>/g,'').slice(0,30),body);
  clearDraft(); pickNext(); renderChips();
  setTimeout(flush,5100);
}
async function flush(){
  let q=outbox(); const now=Date.now(); const keep=[];
  for(const e of q){
    if(e.grace>now){keep.push(e);continue}
    try{
      const r=await fetch('/api/approvals/answer?k='+encodeURIComponent(K),{method:'POST',
        headers:{'Content-Type':'application/json'},body:JSON.stringify(e.body)});
      if(!r.ok&&r.status!==403)keep.push(e);   // retry network/5xx later; 403 = quarantined, drop honestly
    }catch(err){keep.push(e)}
  }
  setOutbox(keep);
  if(keep.length)setTimeout(flush,8000);
}
function showSnack(t,body){
  SNACK=body;
  const s=document.getElementById('snack');
  s.innerHTML=`<span dir="auto">${esc(t)}</span><button class="undo" onclick="undoLast()">تراجع</button>`;
  s.classList.add('show'); clearTimeout(s._t);
  s._t=setTimeout(()=>{s.classList.remove('show');SNACK=null},5200);
}
function undoLast(){
  if(!SNACK)return;
  setOutbox(outbox().filter(e=>!(e.body.client_ts===SNACK.client_ts&&e.body.item_id===SNACK.item_id)));
  const it=ITEMS.find(x=>x.id===SNACK.item_id);
  if(it){it.status='open';delete it.answered;delete it.answered_by;
    D={verdict:(SNACK.answer==='approved'||SNACK.answer==='rejected')?SNACK.answer:(SNACK.fix?'edit':null),
       rating:SNACK.rating||0,note:SNACK.fix||SNACK.note||'',pins:SNACK.comments||[]};
    CUR=it.id; save();}
  document.getElementById('snack').classList.remove('show'); SNACK=null;
  render(); renderChips();
}

/* ================= go ================= */
(async()=>{ if(await whoami()){ await load(true); flush(); setInterval(()=>load(false),12000); } })();
