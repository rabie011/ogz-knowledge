<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>OGZ Content Intelligence</title>
<style>
:root { --bg: #0a0a0a; --card: #151515; --border: #252525; --gold: #F0BE5E; --text: #e0e0e0; --dim: #777; --green: #4ade80; --red: #f87171; }
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
.header { padding: 24px 32px; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 16px; }
.header h1 { font-size: 20px; font-weight: 600; }
.header span { color: var(--gold); font-size: 13px; background: #2a2000; padding: 3px 10px; border-radius: 12px; }
.container { max-width: 1200px; margin: 0 auto; padding: 24px; }
.tabs { display: flex; gap: 4px; margin-bottom: 24px; flex-wrap: wrap; }
.tab { padding: 10px 20px; background: var(--card); border: 1px solid var(--border); border-radius: 8px; cursor: pointer; font-size: 14px; color: var(--dim); transition: all 0.2s; }
.tab:hover { color: var(--text); border-color: var(--gold); }
.tab.active { color: var(--gold); border-color: var(--gold); background: #1a1400; }
.panel { display: none; }
.panel.active { display: block; }
.card { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 24px; margin-bottom: 16px; }
.card h2 { font-size: 16px; color: var(--gold); margin-bottom: 12px; }
.form-row { display: flex; gap: 12px; margin-bottom: 12px; flex-wrap: wrap; }
.form-group { flex: 1; min-width: 150px; }
.form-group label { display: block; font-size: 12px; color: var(--dim); margin-bottom: 4px; }
.form-group select, .form-group input { width: 100%; padding: 8px 12px; background: var(--bg); border: 1px solid var(--border); border-radius: 6px; color: var(--text); font-size: 14px; }
.btn { padding: 10px 24px; background: var(--gold); color: #000; border: none; border-radius: 8px; font-weight: 600; cursor: pointer; font-size: 14px; transition: opacity 0.2s; }
.btn:hover { opacity: 0.85; }
.btn:disabled { opacity: 0.5; cursor: wait; }
.result { margin-top: 16px; padding: 16px; background: var(--bg); border-radius: 8px; white-space: pre-wrap; font-size: 13px; line-height: 1.6; max-height: 500px; overflow-y: auto; }
.score-big { font-size: 64px; font-weight: 700; color: var(--gold); text-align: center; }
.score-label { text-align: center; font-size: 14px; color: var(--dim); }
.score-bar { display: flex; gap: 8px; margin-top: 16px; }
.score-item { flex: 1; text-align: center; }
.score-item .val { font-size: 24px; font-weight: 600; }
.score-item .lbl { font-size: 11px; color: var(--dim); }
.ml-badge { display: inline-block; padding: 4px 12px; border-radius: 12px; font-size: 12px; font-weight: 600; }
.ml-high { background: #0a2e0a; color: var(--green); }
.ml-low { background: #2e0a0a; color: var(--red); }
.calendar-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 8px; }
.cal-item { padding: 12px; background: var(--bg); border-radius: 8px; border-left: 3px solid var(--gold); }
.cal-item .date { font-size: 12px; color: var(--gold); }
.cal-item .desc { font-size: 13px; margin-top: 4px; }
.stat-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(120px, 1fr)); gap: 12px; margin-bottom: 16px; }
.stat { text-align: center; padding: 16px; background: var(--bg); border-radius: 8px; }
.stat .num { font-size: 28px; font-weight: 700; color: var(--gold); }
.stat .lbl { font-size: 11px; color: var(--dim); margin-top: 4px; }
.brief-output { direction: rtl; text-align: right; font-family: 'Segoe UI', 'Arial', sans-serif; }
.caption-item { padding: 12px; background: var(--bg); border-radius: 8px; margin-bottom: 8px; direction: rtl; text-align: right; font-size: 15px; line-height: 1.8; }
.loading { color: var(--dim); font-style: italic; }
</style>
</head>
<body>
<div class="header">
  <h1>OGZ Content Intelligence</h1>
  <span>4315 obs · 1255 patterns · 6 sectors</span>
</div>

<div class="container">
  <div class="tabs">
    <div class="tab active" data-tab="score">Score</div>
    <div class="tab" data-tab="brief">AI Brief</div>
    <div class="tab" data-tab="calendar">Calendar</div>
    <div class="tab" data-tab="caption">Captions</div>
    <div class="tab" data-tab="benchmark">Benchmark</div>
    <div class="tab" data-tab="search">Search</div>
  </div>

  <!-- SCORE -->
  <div class="panel active" id="score">
    <div class="card">
      <h2>Content Scorer</h2>
      <div class="form-row">
        <div class="form-group"><label>Sector</label><select id="s-sector"><option>f_and_b</option><option>beauty_personal_care</option><option>retail_lifestyle</option><option>fashion</option><option>real_estate</option><option>healthcare_wellness</option></select></div>
        <div class="form-group"><label>Content Type</label><select id="s-ct"><option>carousel_slide</option><option>image</option><option>video</option><option>reel</option></select></div>
        <div class="form-group"><label>Occasion</label><select id="s-occ"><option>evergreen</option><option>ramadan</option><option>founding_day</option><option>national_day</option><option>eid_al_fitr</option><option>jeddah_season</option><option>riyadh_season</option></select></div>
      </div>
      <div class="form-row">
        <div class="form-group"><label>Pattern 1</label><input id="s-p1" value="product_hero"></div>
        <div class="form-group"><label>Pattern 2</label><input id="s-p2" value="heritage_storytelling_hook"></div>
        <div class="form-group"><label>Lighting</label><input id="s-light" value="dramatic_moody"></div>
        <div class="form-group"><label>Setting</label><input id="s-set" value="studio"></div>
      </div>
      <button class="btn" onclick="runScore()">Score This Content</button>
      <div id="score-result"></div>
    </div>
  </div>

  <!-- AI BRIEF -->
  <div class="panel" id="brief">
    <div class="card">
      <h2>AI Creative Brief Generator</h2>
      <div class="form-row">
        <div class="form-group"><label>Sector</label><select id="b-sector"><option>f_and_b</option><option>beauty_personal_care</option><option>retail_lifestyle</option><option>fashion</option><option>healthcare_wellness</option></select></div>
        <div class="form-group"><label>Brand Name</label><input id="b-brand" value="AlBaik"></div>
        <div class="form-group"><label>Occasion</label><select id="b-occ"><option>evergreen</option><option>ramadan</option><option>founding_day</option><option>national_day</option></select></div>
        <div class="form-group"><label>Content Type</label><select id="b-ct"><option>carousel_slide</option><option>image</option><option>video</option><option>reel</option></select></div>
      </div>
      <button class="btn" onclick="runBrief()">Generate Brief</button>
      <div id="brief-result"></div>
    </div>
  </div>

  <!-- CALENDAR -->
  <div class="panel" id="calendar">
    <div class="card">
      <h2>Monthly Content Calendar</h2>
      <div class="form-row">
        <div class="form-group"><label>Sector</label><select id="c-sector"><option>f_and_b</option><option>beauty_personal_care</option><option>retail_lifestyle</option><option>fashion</option></select></div>
        <div class="form-group"><label>Posts per week</label><select id="c-ppw"><option>3</option><option>4</option><option>5</option><option>7</option></select></div>
      </div>
      <button class="btn" onclick="runCalendar()">Generate Calendar</button>
      <div id="calendar-result"></div>
    </div>
  </div>

  <!-- CAPTIONS -->
  <div class="panel" id="caption">
    <div class="card">
      <h2>Arabic Caption Generator</h2>
      <div class="form-row">
        <div class="form-group"><label>Sector</label><select id="cap-sector"><option>f_and_b</option><option>beauty_personal_care</option><option>fashion</option></select></div>
        <div class="form-group"><label>Pattern</label><input id="cap-pattern" value="product_hero"></div>
        <div class="form-group"><label>Occasion</label><select id="cap-occ"><option>evergreen</option><option>ramadan</option><option>founding_day</option></select></div>
        <div class="form-group"><label>Tone</label><select id="cap-tone"><option>inviting</option><option>proud</option><option>excited</option><option>warm</option></select></div>
      </div>
      <button class="btn" onclick="runCaption()">Generate Captions</button>
      <div id="caption-result"></div>
    </div>
  </div>

  <!-- BENCHMARK -->
  <div class="panel" id="benchmark">
    <div class="card">
      <h2>Sector Benchmark</h2>
      <div class="form-row">
        <div class="form-group"><label>Sector</label><select id="bm-sector"><option>f_and_b</option><option>beauty_personal_care</option><option>retail_lifestyle</option><option>fashion</option><option>real_estate</option><option>healthcare_wellness</option></select></div>
      </div>
      <button class="btn" onclick="runBenchmark()">Load Benchmark</button>
      <div id="benchmark-result"></div>
    </div>
  </div>

  <!-- SEARCH -->
  <div class="panel" id="search">
    <div class="card">
      <h2>Semantic Search</h2>
      <div class="form-row">
        <div class="form-group" style="flex:3"><label>Search (natural language)</label><input id="sr-query" value="heritage ramadan food iftar" style="width:100%"></div>
        <div class="form-group"><label>Sector (optional)</label><select id="sr-sector"><option value="">All</option><option>f_and_b</option><option>beauty_personal_care</option><option>fashion</option></select></div>
      </div>
      <button class="btn" onclick="runSearch()">Search</button>
      <div id="search-result"></div>
    </div>
  </div>
</div>

<script>
const API = window.location.origin;

document.querySelectorAll('.tab').forEach(t => {
  t.addEventListener('click', () => {
    document.querySelectorAll('.tab').forEach(x => x.classList.remove('active'));
    document.querySelectorAll('.panel').forEach(x => x.classList.remove('active'));
    t.classList.add('active');
    document.getElementById(t.dataset.tab).classList.add('active');
  });
});

async function api(method, path, body) {
  const opts = { method, headers: {'Content-Type':'application/json'} };
  if (body) opts.body = JSON.stringify(body);
  const r = await fetch(API + path, opts);
  return r.json();
}

async function runScore() {
  const el = document.getElementById('score-result');
  el.innerHTML = '<div class="loading">Scoring...</div>';
  const patterns = [document.getElementById('s-p1').value, document.getElementById('s-p2').value].filter(Boolean);
  const d = await api('POST', '/api/score', {
    sector: document.getElementById('s-sector').value,
    content_type: document.getElementById('s-ct').value,
    patterns, occasion: document.getElementById('s-occ').value,
    lighting: document.getElementById('s-light').value || null,
    setting: document.getElementById('s-set').value || null,
  });
  const ml = d.ml_score || {};
  const mlClass = ml.high_probability >= 50 ? 'ml-high' : 'ml-low';
  el.innerHTML = `
    <div class="score-big">${d.score}</div>
    <div class="score-label">${d.interpretation}</div>
    ${ml.high_probability != null ? `<div style="text-align:center;margin-top:8px"><span class="ml-badge ${mlClass}">ML: ${ml.high_probability}% high probability</span></div>` : ''}
    <div class="score-bar">
      <div class="score-item"><div class="val">${d.breakdown.content_type_score}</div><div class="lbl">Content Type</div></div>
      <div class="score-item"><div class="val">${d.breakdown.pattern_score}</div><div class="lbl">Pattern</div></div>
      <div class="score-item"><div class="val">${d.breakdown.occasion_score}</div><div class="lbl">Occasion</div></div>
      <div class="score-item"><div class="val">${d.breakdown.visual_boost}</div><div class="lbl">Visual</div></div>
    </div>
    <div style="text-align:center;margin-top:12px;color:var(--dim);font-size:12px">Based on ${d.data_points} observations</div>`;
}

async function runBrief() {
  const el = document.getElementById('brief-result');
  el.innerHTML = '<div class="loading">Generating brief (10-15s)...</div>';
  const d = await api('POST', '/api/brief/ai', {
    sector: document.getElementById('b-sector').value,
    brand_name: document.getElementById('b-brand').value,
    occasion: document.getElementById('b-occ').value,
    content_type: document.getElementById('b-ct').value,
    language: 'arabic',
  });
  el.innerHTML = `<div class="result brief-output">${d.brief.replace(/\n/g,'<br>')}</div>`;
}

async function runCalendar() {
  const el = document.getElementById('calendar-result');
  el.innerHTML = '<div class="loading">Generating calendar...</div>';
  const d = await api('POST', '/api/calendar', {
    sector: document.getElementById('c-sector').value,
    posts_per_week: parseInt(document.getElementById('c-ppw').value),
  });
  el.innerHTML = `<div style="margin-bottom:12px;color:var(--dim)">${d.total_posts} posts for ${d.month} · ${d.primary_occasion}</div>
    <div class="calendar-grid">${d.calendar.map(e => `
      <div class="cal-item">
        <div class="date">${e.date} (${e.day_of_week.slice(0,3)})</div>
        <div class="desc">${e.content_type} · ${e.pattern}</div>
        <div style="color:var(--gold);font-size:12px;margin-top:4px">${e.expected_engagement}% expected</div>
      </div>`).join('')}</div>`;
}

async function runCaption() {
  const el = document.getElementById('caption-result');
  el.innerHTML = '<div class="loading">Generating captions (3-5s)...</div>';
  const d = await api('POST', '/api/caption', {
    sector: document.getElementById('cap-sector').value,
    pattern: document.getElementById('cap-pattern').value,
    occasion: document.getElementById('cap-occ').value,
    tone: document.getElementById('cap-tone').value,
    language: 'arabic', count: 3,
  });
  el.innerHTML = d.captions.map(c => `<div class="caption-item">${c}</div>`).join('');
}

async function runBenchmark() {
  const el = document.getElementById('benchmark-result');
  el.innerHTML = '<div class="loading">Loading benchmark...</div>';
  const d = await api('GET', `/api/benchmark/${document.getElementById('bm-sector').value}`);
  el.innerHTML = `
    <div class="stat-grid">
      <div class="stat"><div class="num">${d.total_observations}</div><div class="lbl">Observations</div></div>
      <div class="stat"><div class="num">${d.overall_high_engagement_pct}%</div><div class="lbl">High Engagement</div></div>
      <div class="stat"><div class="num">${d.top_patterns.length}</div><div class="lbl">Top Patterns</div></div>
      <div class="stat"><div class="num">${d.account_leaderboard.length}</div><div class="lbl">Accounts</div></div>
    </div>
    <h3 style="color:var(--gold);margin:16px 0 8px">Top Patterns</h3>
    ${d.top_patterns.slice(0,5).map(p => `<div style="display:flex;justify-content:space-between;padding:8px;border-bottom:1px solid var(--border)"><span>${p.pattern}</span><span style="color:var(--gold)">${p.high_pct}% (${p.total} obs)</span></div>`).join('')}
    <h3 style="color:var(--gold);margin:16px 0 8px">Visual DNA</h3>
    ${d.visual_dna.slice(0,3).map(v => `<div style="display:flex;justify-content:space-between;padding:8px;border-bottom:1px solid var(--border)"><span>${v.lighting} + ${v.setting}</span><span style="color:var(--gold)">${v.high_pct}%</span></div>`).join('')}
    <h3 style="color:var(--gold);margin:16px 0 8px">Account Leaderboard</h3>
    ${d.account_leaderboard.slice(0,5).map(a => `<div style="display:flex;justify-content:space-between;padding:8px;border-bottom:1px solid var(--border)"><span>@${a.account}</span><span style="color:var(--gold)">${a.high_pct}% (${a.total} obs)</span></div>`).join('')}`;
}

async function runSearch() {
  const el = document.getElementById('search-result');
  el.innerHTML = '<div class="loading">Searching (1-2s)...</div>';
  const sector = document.getElementById('sr-sector').value;
  const d = await api('POST', '/api/search', {
    query: document.getElementById('sr-query').value,
    sector: sector || null, top_n: 8,
  });
  el.innerHTML = d.results.map(r => `
    <div style="display:flex;gap:12px;padding:12px;border-bottom:1px solid var(--border)">
      <span style="color:var(--gold);min-width:50px">${(r.similarity*100).toFixed(0)}%</span>
      <div><div>@${r.account} · ${r.content_type}</div><div style="color:var(--dim);font-size:12px;margin-top:4px">${r.caption_preview || 'No caption'}</div></div>
    </div>`).join('');
}
</script>
</body>
</html>
