services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: ogz-postgres
    environment:
      POSTGRES_USER: ogz
      POSTGRES_PASSWORD: ogz_local_dev
      POSTGRES_DB: ogz_knowledge
    ports:
      - "5432:5432"
    volumes:
      - ogz_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ogz -d ogz_knowledge"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  ogz_pgdata:
