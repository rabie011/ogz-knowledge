openapi: 3.0.3
info:
  title: OGZ Brain API
  version: "1.0.0"
  description: >
    The connection contract the dev platform builds against. ogz-knowledge (the BRAIN) exposes three
    capabilities over HTTP — profile IN (/extract), content OUT (/produce), performance BACK (/performance) —
    plus /job polling and /health. Hand-maintained to mirror scripts/brain_api.py + scripts/brain_contract.py
    (the request contract) exactly. Generated by orchestra beat 10 (RABIE + DeepSeek pick).
servers:
  - url: http://127.0.0.1:4140
    description: Reference bridge on the Mac Mini (devs run their own production instance)
security:
  - bearerAuth: []
paths:
  /health:
    get:
      summary: Liveness + queue depth + HUMAIN state (no auth)
      security: []
      responses:
        "200":
          description: alive
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok: { type: boolean, example: true }
                  humain: { type: boolean, description: "Arabic caption judge browser up?" }
                  queue_depth: { type: integer, description: pending /produce jobs }
                  auth_required: { type: boolean, example: true }
  /extract:
    get:
      summary: Brand profile IN — the 81-field pre_fill + readiness (fast, sync)
      parameters:
        - name: handle
          in: query
          required: true
          schema: { type: string, pattern: "^[A-Za-z0-9._-]{2,40}$" }
          example: albaik
      responses:
        "200":
          description: profile extracted
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Profile" }
        "400": { $ref: "#/components/responses/FieldError" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "404":
          description: brand not onboarded
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
        "500": { $ref: "#/components/responses/ServerError" }
  /produce:
    post:
      summary: Content OUT — a post (banked image + system caption + 2-judge). Slow → async 202 + job.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/ProduceRequest" }
      responses:
        "202":
          description: accepted — poll /job/{job_id}
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok: { type: boolean, example: true }
                  job_id: { type: string }
                  poll: { type: string, example: "/job/abc123" }
                  queue_position: { type: integer }
                  estimated_seconds: { type: integer }
        "400": { $ref: "#/components/responses/FieldError" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "429":
          description: produce queue full (backpressure) — retry after the header/field
          headers:
            Retry-After: { schema: { type: integer }, description: seconds }
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok: { type: boolean, example: false }
                  error: { type: string }
                  queue_depth: { type: integer }
                  retry_after_seconds: { type: integer }
  /job/{job_id}:
    get:
      summary: Poll a produce job
      parameters:
        - name: job_id
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          description: job state (status = pending | running | done | failed)
          content:
            application/json:
              schema:
                type: object
                properties:
                  status: { type: string, enum: [pending, running, done, failed] }
                  result: { $ref: "#/components/schemas/PostContent" }
                  error: { type: string }
                  created: { type: integer }
                  updated: { type: integer }
        "404":
          description: no such job
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
  /performance:
    post:
      summary: Performance BACK — engagement of a published post feeds the learning loop (sync)
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/PerformanceRequest" }
      responses:
        "200":
          description: ingested
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok: { type: boolean, example: true }
                  z_score: { type: number, nullable: true, description: "null during cold-start (<5 posts)" }
                  action: { type: string, nullable: true, enum: [kill, promote, null] }
                  detail: { type: string, nullable: true }
        "400": { $ref: "#/components/responses/FieldError" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "500": { $ref: "#/components/responses/ServerError" }
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      description: BRAIN_API_TOKEN (set in env; /health is the only open route)
  responses:
    Unauthorized:
      description: missing/invalid bearer token
      content:
        application/json:
          schema: { $ref: "#/components/schemas/Error" }
    FieldError:
      description: request violates the field contract (brain_contract.py)
      content:
        application/json:
          schema: { $ref: "#/components/schemas/FieldErrorBody" }
    ServerError:
      description: internal error
      content:
        application/json:
          schema: { $ref: "#/components/schemas/Error" }
  schemas:
    Error:
      type: object
      properties:
        ok: { type: boolean, example: false }
        error: { type: string }
    FieldErrorBody:
      type: object
      properties:
        ok: { type: boolean, example: false }
        error: { type: string, example: "must be a non-negative integer, got str" }
        field: { type: string, example: reach, description: the offending field }
    ProduceRequest:
      type: object
      required: [handle, product, chain]
      properties:
        handle: { type: string, pattern: "^[A-Za-z0-9._-]{2,40}$" }
        product: { type: string, minLength: 1, example: بروست }
        chain: { type: string, pattern: "^[A-Za-z0-9_-]{2,16}$", example: G03 }
        occasion: { type: string, default: everyday }
        produce: { type: boolean, default: true }
        regenerate: { type: boolean, default: false }
    PerformanceRequest:
      type: object
      required: [post_id, reach]
      properties:
        post_id: { type: string, example: "albaik__بروست__G03" }
        likes: { type: integer, minimum: 0, default: 0 }
        saves: { type: integer, minimum: 0, default: 0 }
        comments: { type: integer, minimum: 0, default: 0 }
        shares: { type: integer, minimum: 0, default: 0 }
        reach: { type: integer, minimum: 1, description: "required, positive (engagement_rate denominator)" }
    Profile:
      type: object
      description: the export_prefill wrapper — 81-field pre_fill + readiness gate
      properties:
        ok: { type: boolean }
        schema_version: { type: string, example: ogz-prefill-1.0 }
        brand_id: { type: string, example: "ogz:albaik" }
        onboarding_status: { type: string }
        ready: { type: boolean, description: "A3 gate — coverage>=60% AND >=1 banked render" }
        readiness:
          type: object
          properties:
            ready: { type: boolean }
            coverage_pct: { type: integer }
            banked_renders: { type: integer }
            min_coverage: { type: integer, example: 60 }
            blocking_reasons: { type: array, items: { type: string } }
        sources_present: { type: object, additionalProperties: { type: boolean } }
        pre_fill:
          type: object
          description: 81 brand fields (brand_name_*, sector, palette, audience, cadence, …) — see export_prefill.PREFILL_KEYS
          additionalProperties: true
        confidence: { type: number }
        brand_understanding: { type: string, nullable: true }
    PostContent:
      type: object
      description: a produced post (the /produce job result)
      properties:
        post_id: { type: string }
        image: { type: string, description: banked render path }
        caption: { type: string, description: "system-generated, the exact judged string" }
        status: { type: string, example: banking_queued }
        passed: { type: boolean, description: auto-approve = 2 agreeing judges }
        slot: { type: string, format: date }
